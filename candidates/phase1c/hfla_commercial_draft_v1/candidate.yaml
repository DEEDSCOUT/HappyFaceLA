    reliability_tier: "TIER_1_PRIMARY"
    status: "DRAFT"
    notes: "Direct observation of live pricing page on research date."

  - evidence_id: "HFLA-EVD-004"
    source_category: "OFFICIAL_POLICY"
    source_name: "Google Ads — Misrepresentation policy"
    source_locator: "https://support.google.com/adspolicy/answer/6020955"
    access_or_extraction_date: "2025-07-21"
    verified_fact: >
      Google Ads misrepresentation policy prohibits: omitting or obscuring
      billing details such as how, what, and when users will be charged;
      making offers that aren't actually available; making misleading claims.
      Ads must be clear, honest, and provide information users need to make
      informed decisions.  Ad pricing claims must match the landing page.
    related_rule_ids:
      - "HFLA-RULE-CI-001"
    reliability_tier: "TIER_1_PRIMARY"
    status: "DRAFT"
    notes: "Official Google Ads policy page accessed on research date."

  - evidence_id: "HFLA-EVD-005"
    source_category: "OFFICIAL_POLICY"
    source_name: "Google Ads — Editorial and destination requirements"
    source_locator: "https://support.google.com/adspolicy/answer/6008942"
    access_or_extraction_date: "2025-07-21"
    verified_fact: >
      Google Ads editorial policy prohibits overly generic ads with vague
      phrases.  Destination requirements state ad landing pages must offer
      unique value, be functional, useful, and easy to navigate.  Display URLs
      must accurately reflect the landing page URL.  Ad copy for pricing
      claims must be specific and accurate.
    related_rule_ids:
      - "HFLA-RULE-CI-001"
      - "HFLA-RULE-AR-001"
    reliability_tier: "TIER_1_PRIMARY"
    status: "DRAFT"
    notes: "Official Google Ads policy overview page accessed on research date."

  - evidence_id: "HFLA-EVD-006"
    source_category: "MARKET_RESEARCH"
    source_name: "LA-area face painting market rate research (web, 2025-07-21)"
    source_locator: "PLACEHOLDER — competitor sites returned HTTP errors during research"
    access_or_extraction_date: "2025-07-21"
    verified_fact: >
      Direct competitor site access returned 404 or extraction errors during
      research (Thumbtack /near-me/ pages, GigSalad category pages, and
      several local LA vendor sites).  General market knowledge indicates
      face painters in the LA metro typically range from $100 to $300+ per
      hour depending on artist experience, service type, and location.
      HFLA's $150 minimum is positioned at the accessible end of the LA
      professional market.  This record is OPEN_EVIDENCE_REQUIRED and should
      be updated with verified competitor data under CEO direction.
    related_rule_ids:
      - "HFLA-RULE-PP-001"
      - "HFLA-RULE-PP-004"
      - "HFLA-RULE-PP-005"
    reliability_tier: "TIER_3_INDICATIVE"
    status: "DRAFT"
    notes: >
      Competitor research was limited by site access errors.  CEO should
      direct a formal market analysis to verify pricing competitiveness
      before public channel launch.

# ---------------------------------------------------------------------------
# 3. BLOCKER RECORDS — 18 ordinary CEO-decision blockers
#    All blocks_phase_1c_content_loading: false (ordinary business decisions)
# ---------------------------------------------------------------------------

blocker_records:

  - blocker_id: "HFLA-BLK-001"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm that $150 is the authorised minimum booking price for a single
      service with one artist across all public channels and the customer
      chatbot.
    why_it_matters: >
      The $150 floor is currently on the live website.  Formalising it as a
      governed rule ensures all channels (website, ads, chatbot, operators)
      communicate a consistent floor price and prevents ad copy or chatbot
      responses from implying a lower entry point.
    risk_if_missing: >
      Without CEO confirmation, a future channel update or chatbot response
      could undercut the stated floor, creating pricing inconsistency and
      potential customer friction.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-001"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-003"]
    blocked_channels: ["WEBSITE_PUBLIC", "GOOGLE_ADS_PUBLIC", "CUSTOMER_CHATBOT_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-002"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether HFLA will publish explicit hourly rates, maintain flat
      starting-price packages only, or use a hybrid (starting price + hourly
      add-on after a base block).
    why_it_matters: >
      The pricing model determines how operators quote, how the website
      communicates value, and whether Google Ads can include a specific
      time-based call-out (e.g. '$150 / first 2 hours').  Customers
      frequently compare face painters on an hourly basis.
    risk_if_missing: >
      Quote operators may use inconsistent pricing structures, leading to
      variable quotes for similar events and potential customer complaints.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-001", "HFLA-RULE-PP-004"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-006"]
    blocked_channels: ["WEBSITE_PUBLIC", "GOOGLE_ADS_PUBLIC", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-003"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm the $50 deposit amount, or decide to change it (e.g. to a
      percentage of the quote or a higher flat amount).  Also confirm the
      payment method accepted for the deposit.
    why_it_matters: >
      The deposit is the first financial commitment in the booking funnel.
      The amount affects conversion rate and the cost of a last-minute
      cancellation to the business.  Payment method (Venmo, Zelle, card,
      cash) must be specified for operator use and public disclosure.
    risk_if_missing: >
      Operators may collect deposits in inconsistent amounts or methods,
      creating accounting and refund disputes.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-002", "HFLA-RULE-PP-003", "HFLA-RULE-BP-001"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-004"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Choose the travel fee calculation method: (A) flat fee per zone/city,
      (B) mileage rate from a home base, (C) tiered flat fee by county, or
      (D) included in the booking minimum for local LA / added for OC and
      Ventura.
    why_it_matters: >
      Travel fee consistency is a top source of customer surprise charges.
      The booking policy currently states travel 'may be included or added
      depending on event location.'  A defined method lets the quote operator
      provide an accurate total without last-minute additions.
    risk_if_missing: >
      Undefined travel fees lead to quote operator inconsistency and
      customer complaints about surprise charges on the event day.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-QT-001"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-005"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Set specific travel premium amounts for Orange County and Ventura County
      events, separate from the LA base zone.
    why_it_matters: >
      Multi-county coverage is a published differentiator on the website.
      Without specific premium amounts, operators cannot quote multi-county
      events accurately and consistently.
    risk_if_missing: >
      Orange County and Ventura County quotes will be inconsistent.
      Customers in those areas may receive quotes that vary widely between
      operators or repeat bookings.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-QT-001"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-006"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether to publish a starting price for two-service combined
      packages (face painting + balloon twisting), or maintain quote-only for
      all multi-service bookings.  If a starting price is published, set the
      amount.
    why_it_matters: >
      The 'Face Painting + Balloons Package' is listed on the pricing page
      with 'Request a quote.'  A published starting price for this popular
      combination could improve conversion by reducing the friction of a
      quote request for straightforward dual-service bookings.
    risk_if_missing: >
      Potential customers who want a quick price estimate for a combined
      booking have no reference and may select a competitor with a stated
      price.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-004"]
    related_evidence_ids: ["HFLA-EVD-003", "HFLA-EVD-006"]
    blocked_channels: ["WEBSITE_PUBLIC", "GOOGLE_ADS_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-007"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether to publish a starting price for the Glitter + Gems
      Add-On, or maintain quote-only.  If a starting price is published,
      set the amount.
    why_it_matters: >
      Glitter tattoos and face gems are listed as 'Request a quote' add-ons.
      Publishing an add-on starting price helps customers budget before
      submitting a quote request.
    risk_if_missing: >
      Customers interested in add-ons have no pricing signal, which may
      reduce uptake of higher-margin add-on services.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-005"]
    related_evidence_ids: ["HFLA-EVD-003"]
    blocked_channels: ["WEBSITE_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-008"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Set the minimum booking fee for school carnivals, fundraisers, and
      festival booths, and confirm the standard per-additional-artist rate
      for multi-artist school/festival setups.
    why_it_matters: >
      School and festival bookings require multi-artist coordination and
      longer setup time.  A published minimum protects margin on large-event
      commitments and simplifies operator quoting for institutional clients.
    risk_if_missing: >
      Quote operators may under-price school/festival bookings by treating
      them as single-event birthday rates, creating margin pressure on
      high-labour events.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-VS-001"]
    related_evidence_ids: ["HFLA-EVD-003"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-009"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Set the invoice payment terms for corporate clients: net payment window
      (e.g. net 7 or net 14), deposit structure for corporate accounts
      (same $50 or percentage-based), and whether a corporate minimum
      booking size applies.
    why_it_matters: >
      Corporate bookings (company picnics, city events, mall activations) are
      a separate client segment that may require professional invoicing and
      different payment timing than residential event bookings.
    risk_if_missing: >
      Corporate clients may expect net-30 terms; without a policy, the
      business risks cash flow gaps on large-event commitments or disputes
      over payment timing.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-VS-002"]
    related_evidence_ids: ["HFLA-EVD-003"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-010"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Set the overtime hourly rate charged when a client requests and the
      artist approves additional time beyond the scheduled end.
    why_it_matters: >
      The booking policy currently states overtime is 'added to the final
      balance based on the services being provided and the additional time
      requested' without a specific rate.  A defined rate lets the quote
      operator communicate overtime costs upfront and prevents end-of-event
      disputes.
    risk_if_missing: >
      Overtime charges without a pre-defined rate create customer friction
      and potential disputes at the end of events.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-BP-003"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-011"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether to implement a holiday or peak-demand surcharge (e.g.
      Halloween, Christmas, Fourth of July, school year end) and set the
      trigger dates and surcharge amount.
    why_it_matters: >
      Holiday dates see the highest demand and often require more lead time
      for artist scheduling.  A demand surcharge lets the business capture
      additional margin on peak dates and manage demand without turning down
      bookings.
    risk_if_missing: >
      Without a peak surcharge policy, the business underprices its most
      constrained inventory on high-demand dates.
    priority: "LOW"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-001"]
    related_evidence_ids: ["HFLA-EVD-006"]
    blocked_channels: []
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-012"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether to implement a last-minute booking surcharge, and if so,
      set the trigger window (e.g. less than 48 hours) and the surcharge
      amount or percentage.
    why_it_matters: >
      Last-minute bookings require rapid artist confirmation and may disrupt
      existing schedules.  A surcharge compensates for this operational
      burden and deters unreliable last-minute customers.
    risk_if_missing: >
      Artists may be asked to accept last-minute bookings at standard rates,
      creating operational friction and reducing artist satisfaction.
    priority: "LOW"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-BP-004"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: []
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-013"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Define the cancellation notice window in days — the number of days
      before the event by which a cancellation must be received for any
      consideration of deposit credit toward a future booking.
    why_it_matters: >
      The booking policy currently states the deposit is 'non-refundable'
      without specifying a notice window for the deposit-transfer option.
      A clear window is required for the booking policy page and for
      operator guidance on handling cancellations.
    risk_if_missing: >
      Without a defined window, customers may expect a deposit transfer
      regardless of timing, creating disputes when cancellations occur
      close to the event date.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-BP-001"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-014"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm that the deposit transfer is available exactly one time per
      client, and set the minimum advance notice required for a reschedule
      transfer to be approved.
    why_it_matters: >
      The booking policy page states the deposit 'may be transferred one time
      to a new event date with advance notice.'  The advance notice threshold
      is not defined.  Without it, operators cannot apply the policy
      consistently.
    risk_if_missing: >
      Operators applying the transfer policy inconsistently may grant
      transfers with very short notice, undermining the revenue-protection
      purpose of the non-refundable deposit.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-BP-002"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-015"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Define the weather cancellation policy: if unsafe outdoor conditions
      prevent service from starting and the event cannot move indoors, does
      the client receive a deposit credit, a partial refund, or no refund?
      Set the specific policy terms.
    why_it_matters: >
      Weather cancellations are outside both parties' control.  A defined
      policy protects the business from full refund demands while being fair
      to clients who cannot provide safe outdoor conditions.
    risk_if_missing: >
      Weather disputes create negative reviews and social media complaints,
      disproportionately damaging a family-oriented brand.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-SC-001"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-016"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Authorise the Google Ads campaign: confirm the target campaign budget,
      geographic targeting (LA County only, or all three counties), target
      keywords, and the specific ad copy and landing page to use.
    why_it_matters: >
      Google Ads requires that ad price claims match the landing page.  No ad
      copy may go live without CEO review of the headline, description, and
      the destination URL.  Google Ads policies prohibit misleading pricing
      claims, which requires explicit sign-off on the approved ad wording.
    risk_if_missing: >
      Unapproved or misaligned ad copy risks Google Ads policy violations,
      ad disapprovals, and potential account-level enforcement action.
    priority: "CRITICAL"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-CI-001"]
    related_evidence_ids: ["HFLA-EVD-004", "HFLA-EVD-005"]
    blocked_channels: ["GOOGLE_ADS_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-017"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Define the chatbot authority limit for pricing: exactly what pricing
      information the chatbot is permitted to state without human escalation
      (e.g. starting price only, deposit only, or full pricing overview).
      Approve the specific escalation message template.
    why_it_matters: >
      An overly narrow chatbot creates a poor customer experience; an overly
      broad chatbot may quote prices the business cannot honour.  The approved
      escalation message becomes the canonical customer-facing response when
      a specific quote is needed.
    risk_if_missing: >
      Without defined chatbot authority limits, the chatbot may either
      frustrate customers by refusing to share the starting price, or
      over-promise by quoting specific event prices that cannot be confirmed
      without operator review.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-AR-001", "HFLA-RULE-AR-002"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-005"]
    blocked_channels: ["CUSTOMER_CHATBOT_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-018"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether to publish a specific quote response SLA on the website
      (e.g. 'Response within 2 business hours' or 'Same business day').  If
      yes, set the commitment window and the channels on which it appears.
    why_it_matters: >
      A specific response time promise is a proven conversion differentiator
      for service businesses operating in a competitive quote-driven market.
      The current website language ('expect a response quickly') provides no
      measurable commitment.
    risk_if_missing: >
      Without a stated SLA, the business cannot use response time as a
      competitive claim in Google Ads or on the pricing page.  A vague
      promise may also reduce customer confidence in follow-through.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-QT-003"]
    related_evidence_ids: ["HFLA-EVD-003"]
    blocked_channels: ["WEBSITE_PUBLIC", "GOOGLE_ADS_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

