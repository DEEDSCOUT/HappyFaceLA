  - evidence_id: "HFLA-EVD-003"
    source_category: "WEBSITE"
    source_name: "Happy Faces LA — pricing and packages (happyfacesla.com/pricing/)"
    source_locator: "https://happyfacesla.com/pricing/"
    access_or_extraction_date: "2025-07-21"
    verified_fact: >
      Pricing page lists five package options: (1) Birthday Party Package —
      face painting or balloon twisting, 1 artist, starting at $150;
      (2) Face Painting + Balloons Package — request a quote;
      (3) Glitter + Gems Add-On — request a quote;
      (4) School / Festival Booth — quote required;
      (5) Corporate Family Event Booth — quote required.
      Pricing factors stated: event date/time demand, city and travel distance,
