# Happy Faces LA — Phase 1C Commercial Candidate Package
# Version: DRAFT v1
# Purpose: CEO-review commercial candidate — pricing, booking, channel, and
#          AI-response governance rules for the live commercial website and
#          paid-channel launch.
# Status: DRAFT — NO RECORDS ARE APPROVED OR LIVE.
# Intake gate: validate-phase1c-input -c config -i candidates/phase1c/hfla_commercial_draft_v1
#
# All six governance register families are present.  Five projected channels
# each have exactly one corresponding DRAFT activation.  Exactly one DRAFT
# ReleaseRecord shell is present.  All blockers are ordinary CEO/business
# decisions with blocks_phase_1c_content_loading=false.
#
# Research date: 2025-07-21
# Sources: happyfacesla.com (live), Google Ads policy center (official)

# ---------------------------------------------------------------------------
# 1. RULES — 19 DRAFT governance rules across all 7 canonical categories
# ---------------------------------------------------------------------------

rules:

  # ---- PUBLIC_PRICING (5 rules) -------------------------------------------

  - rule_id: "HFLA-RULE-PP-001"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Minimum booking price floor — single service, single artist"
    status: "DRAFT"
    draft_recommendation: >
      Publish $150 as the public-facing minimum booking price for a single
      service (face painting OR balloon twisting) with one dedicated artist.
      This is the current homepage and booking-policy stated price.  The floor
      should be listed on the pricing page, confirmed in quotes, and repeated
      in the chatbot pricing intro so that all channels show a consistent
      starting figure.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required: confirm $150 floor is authorised for all public
      channels and chatbot.  Decision captured in HFLA-BLK-001.

  - rule_id: "HFLA-RULE-PP-002"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Deposit amount — $50 non-refundable booking hold"
    status: "DRAFT"
    draft_recommendation: >
      Charge a $50 non-refundable deposit to hold the event date.  The deposit
      is applied toward the final balance.  This amount is currently stated on
      the booking policy page and on the homepage 'Why parents book' block.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm $50 deposit amount or adjust.
      Decision captured in HFLA-BLK-003.

  - rule_id: "HFLA-RULE-PP-003"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Balance due timing — full payment day-of before services begin"
    status: "DRAFT"
    draft_recommendation: >
      The remaining balance (total quote minus deposit) is due on the event day
      before the artist begins services.  This rule governs the payment
      timeline and must be disclosed in booking confirmation, quote
      communication, and the booking policy page.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      No unresolved CEO blocker — payment terms are current practice.
      Confirm for public disclosure consistency in HFLA-BLK-003.

  - rule_id: "HFLA-RULE-PP-004"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Multi-service and multi-artist pricing approach"
    status: "DRAFT"
    draft_recommendation: >
      Quotes for face painting + balloon twisting combined (or any two-service
      setup) are provided on request.  No public fixed price exists for
      multi-service packages.  CEO must decide whether to publish a starting
      price for combined packages or maintain quote-only for all multi-service
      bookings.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: authorise a published combined-package starting
      price (e.g. $250) or maintain quote-only.  Decision in HFLA-BLK-006.

  - rule_id: "HFLA-RULE-PP-005"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Add-on service pricing — glitter tattoos and face gems"
    status: "DRAFT"
    draft_recommendation: >
      Glitter tattoos and face gems are offered as add-ons to any primary
      service booking.  Currently listed as 'Request a quote' on the pricing
      page.  CEO must decide whether to publish an add-on starting price or
      maintain quote-only for add-ons.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-007.

  # ---- BOOKING_POLICY (4 rules) -------------------------------------------

  - rule_id: "HFLA-RULE-BP-001"
    rule_category: "BOOKING_POLICY"
    rule_title: "Cancellation policy — deposit forfeiture and conditions"
    status: "DRAFT"
    draft_recommendation: >
      The $50 deposit is non-refundable upon cancellation.  The cancellation
      window (number of days advance notice) must be defined and published.
      Current booking policy page states deposit is non-refundable; the advance
      notice window is not currently specified publicly.  CEO must authorise a
      specific cancellation window.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: cancellation window in days.  Decision in
      HFLA-BLK-013.

  - rule_id: "HFLA-RULE-BP-002"
    rule_category: "BOOKING_POLICY"
    rule_title: "Rescheduling policy — one-time deposit transfer, subject to availability"
    status: "DRAFT"
    draft_recommendation: >
      The deposit may be transferred one time to a new event date with advance
      notice, subject to artist availability.  CEO must confirm the minimum
      advance notice required for a reschedule transfer and whether the
      one-transfer limit is correct.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-014.

  - rule_id: "HFLA-RULE-BP-003"
    rule_category: "BOOKING_POLICY"
    rule_title: "Overtime protocol — pre-approval required before scheduled end"
    status: "DRAFT"
    draft_recommendation: >
      Overtime must be requested and approved before the scheduled end time.
      If approved, overtime is added to the final balance at the operator-set
      rate.  CEO must authorise the specific overtime hourly rate.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: overtime rate per hour.  Decision in HFLA-BLK-010.

  - rule_id: "HFLA-RULE-BP-004"
    rule_category: "BOOKING_POLICY"
    rule_title: "Last-minute booking — surcharge window and amount"
    status: "DRAFT"
    draft_recommendation: >
      Bookings requested within a short window before the event (e.g. 48 hours
      or less) may incur a last-minute surcharge to compensate for schedule
      disruption.  CEO must decide whether to implement a surcharge, the
      trigger window, and the amount.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-012.

  # ---- QUOTE_TRAVEL (3 rules) ---------------------------------------------

  - rule_id: "HFLA-RULE-QT-001"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Travel fee calculation — method and three-county service area"
    status: "DRAFT"
    draft_recommendation: >
      Happy Faces LA serves Los Angeles County, Orange County, and Ventura
      County.  Travel may be included or added depending on event location,
      distance, traffic, parking, and total booking size.  The exact fee
      calculation method (flat per zone, mileage rate, by-city flat, or
      hybrid) must be decided by the CEO and documented for operator use and
      optional public disclosure.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: travel fee method.  Decisions in HFLA-BLK-004
      and HFLA-BLK-005.

  - rule_id: "HFLA-RULE-QT-002"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Parking and setup requirements — client responsibility"
    status: "DRAFT"
    draft_recommendation: >
      Client is responsible for providing safe, nearby parking or covering
      parking fees.  Difficult parking, valet-only, gated access, stairs, or
      long walking distances may affect setup time and should be disclosed
      before booking.  This rule governs what the quote operator must confirm
      during the quote conversation.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      Current booking policy language is adequate.  No unresolved CEO blocker
      on this rule.

  - rule_id: "HFLA-RULE-QT-003"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Quote response SLA — public turnaround commitment"
    status: "DRAFT"
    draft_recommendation: >
      The website currently states 'expect a response with availability and
      pricing quickly.'  A specific SLA (e.g. within 2 business hours or
      same business day) would strengthen the conversion promise on the
      pricing page and in Google Ads extensions.  CEO must decide whether to
      commit to a specific response window.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-018.

  # ---- VENDOR_SCHOOL_CORPORATE (2 rules) ----------------------------------

  - rule_id: "HFLA-RULE-VS-001"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "School and festival booth pricing — minimum fee and artist count"
    status: "DRAFT"
    draft_recommendation: >
      School carnivals, fundraisers, festivals, and camps are served with a
      high-throughput booth setup.  Multiple artists are available.  No public
      minimum is currently stated.  CEO must authorise a minimum booking fee
      for school/festival engagements and the standard multi-artist rate.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-008.

  - rule_id: "HFLA-RULE-VS-002"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "Corporate and company event pricing — invoice terms"
    status: "DRAFT"
    draft_recommendation: >
      Corporate bookings (company picnics, city events, malls) receive a
      custom setup, professional invoice, and full-service entertainment
      station.  CEO must authorise the invoice terms (net payment window,
      deposit structure for corporate clients, and whether a minimum booking
      size applies).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-009.

  # ---- SAFETY_CARE (2 rules) -----------------------------------------------

  - rule_id: "HFLA-RULE-SC-001"
    rule_category: "SAFETY_CARE"
    rule_title: "Outdoor and weather event safety — safe working conditions required"
    status: "DRAFT"
    draft_recommendation: >
      Outdoor events require a shaded, protected setup area away from direct
      sun, rain, strong wind, sprinklers, smoke, dust, and unsafe heat.  If
      conditions are unsafe, services may need to move indoors, pause, or be
      adjusted for safety.  The weather cancellation and partial-refund policy
      must be defined by the CEO.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: weather cancellation client credit/refund
      policy.  Decision in HFLA-BLK-015.

  - rule_id: "HFLA-RULE-SC-002"
    rule_category: "SAFETY_CARE"
    rule_title: "Product safety and hypoallergenic standards for face paint"
    status: "DRAFT"
    draft_recommendation: >
      Face painting, glitter tattoo, and face gem products must meet cosmetic-
      grade safety standards.  The CEO must confirm whether HFLA uses
      hypoallergenic, FDA-compliant face paints and whether allergy
      disclosures are required in booking communications and on the website.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      No blocker — safety practices are operational.  Confirm for public
      channel disclosure if required.

  # ---- AI_CUSTOMER_RESPONSE (2 rules) ------------------------------------

  - rule_id: "HFLA-RULE-AR-001"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "AI chatbot pricing disclosure — scope and accuracy limits"
    status: "DRAFT"
    draft_recommendation: >
      The customer-facing chatbot may state the public $150 starting price and
      direct the customer to the contact form for a full quote.  The chatbot
      must not quote a final price for specific events, as pricing depends on
      guest count, travel, and service mix.  CEO must approve the precise
      pricing disclosure language.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required: chatbot authority limit for pricing.  Decision
      in HFLA-BLK-017.

  - rule_id: "HFLA-RULE-AR-002"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "AI chatbot escalation — human quote threshold"
    status: "DRAFT"
    draft_recommendation: >
      When a chatbot user requests specific pricing, service customisation,
      school/corporate quotes, or multi-artist bookings, the chatbot must
      escalate to the human quote form or phone number (310) 800-2860 rather
      than attempting to provide a binding quote.  Escalation language must
      be approved by the CEO.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-017.

  # ---- CHANNEL_IMPLEMENTATION (1 rule) ------------------------------------

  - rule_id: "HFLA-RULE-CI-001"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Google Ads claim accuracy — landing page alignment requirement"
    status: "DRAFT"
    draft_recommendation: >
      Any price claim in a Google Ads headline or description (e.g. 'Bookings
      from $150') must exactly match the price stated on the ad's landing page.
      Per the Google Ads misrepresentation policy, ads must not omit pricing
      conditions.  All ad copy must reference the same starting price that
      appears on the website pricing page.  CEO must authorise the specific
      ad copy before the campaign launches.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-004"
    internal_notes: >
      CEO decision required: Google Ads campaign authorisation.  Decision in
      HFLA-BLK-016.

