blocker_records:

  - blocker_id: "HFLA-BLK-001"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm 'Face Painting Parties from $150' as the public
      headline price-floor wording across the website, Google
      Ads landing copy, and chatbot pricing intro.
    why_it_matters: >
      The $150 figure already appears on the live homepage and
      pricing page (HFLA-EVD-001, HFLA-EVD-003).  Formalising
      it as the public headline wording ensures all channels
      communicate a consistent entry anchor.  LA per-hour
      comparator HFLA-EVD-008 (Paint On Your Face $120/hr
      face, 2-hour minimum, ~$240 effective minimum) places
      HFLA's $150 entry anchor at or below the LA per-hour
      effective floor.
    risk_if_missing: >
      Without an authorised public headline, ad copy / chatbot
      replies / operator scripts may drift to inconsistent
      starting-price language that under-performs against LA
      competitors and produces customer-trust friction.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-001"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-003", "HFLA-EVD-008"]
    blocked_channels: ["WEBSITE_PUBLIC", "GOOGLE_ADS_PUBLIC", "CUSTOMER_CHATBOT_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-002"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm that the proposed two-tier package ladder (Color
      Pop at $150 / Birthday Favorite at $275) replaces the
      current single-anchor 'Bookings start at $150' framing
      on every public surface, and confirm the live-baseline
      transition sequence (homepage update first, pricing page
      next, Google Ads landing aligned before campaign
      launches).
    why_it_matters: >
      The live HFLA homepage and pricing page currently expose
      a single $150 floor only (HFLA-EVD-001, HFLA-EVD-003).
      Migration from the single-floor framing to the two-tier
      package ladder requires a sequenced update that keeps
      every public surface internally consistent during the
      transition window to avoid Google Ads landing-page
      parity defects (HFLA-RULE-CI-001) and customer
      confusion.
    risk_if_missing: >
      An uncoordinated rollout risks website / ads / chatbot
      divergence: a Google Ads headline could promise
      'Birthday Favorite from $275' while the landing page
      still shows only 'Bookings start at $150', triggering
      Google Ads Misrepresentation enforcement (HFLA-EVD-004).
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-001", "HFLA-RULE-PP-002", "HFLA-RULE-PP-003", "HFLA-RULE-CI-001"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-003", "HFLA-EVD-004"]
    blocked_channels: ["WEBSITE_PUBLIC", "GOOGLE_ADS_PUBLIC", "CUSTOMER_CHATBOT_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-003"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm the customer-facing deposit-confirmation wording
      and the payment methods accepted for the deposit (Venmo,
      Zelle, card, cash).  Confirm that both deposit tiers
      (HFLA-RULE-PP-008) remain non-refundable and apply
      toward the final balance.
    why_it_matters: >
      The deposit is the first financial commitment in the
      booking funnel.  Wording and accepted methods must be
      consistent across the booking-policy page, the booking
      confirmation email and the operator quote conversation.
    risk_if_missing: >
      Operators may collect deposits in inconsistent amounts
      or methods, creating accounting friction and refund
      disputes.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-PP-008", "HFLA-RULE-PP-009"]
    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-004"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Choose the travel fee calculation method: (A) flat per
      zone / city, (B) mileage rate from a home base,
      (C) tiered flat fee by county, or (D) hybrid (LA base
      included, OC and Ventura premium).  Confirm the public
      ZIP-request wording.
    why_it_matters: >
      Travel fee consistency is a top source of customer
      surprise charges.  The booking policy currently states
      travel 'may be included or added depending on event
