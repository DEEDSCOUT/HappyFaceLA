  - blocker_id: "HFLA-BLK-011"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Decide whether to implement a holiday or peak-demand
      surcharge (Halloween, Christmas, July 4, school year
      end) and set the trigger dates and surcharge amount.
    why_it_matters: >
      Holiday dates see the highest demand and often require
      more lead time for artist scheduling.  A demand
      surcharge lets the business capture additional margin
      on peak dates and manage demand without turning down
      bookings.
    risk_if_missing: >
