# Happy Faces LA -- Phase 1C Commercial Candidate Package
# Version: DRAFT v3
# Purpose: CEO-review commercial candidate -- pricing, booking, channel,
#          safety, privacy and AI-response governance rules for the
#          commercial website and paid-channel launch.
# Status: DRAFT -- NO RECORDS ARE APPROVED, RELEASED OR ACTIVE.
# Intake gate: validate-phase1c-input -c config -i candidates/phase1c/hfla_commercial_draft_v3
#
# Authored: 2026-05-24 (research date).
#
# Defects corrected since v2 (commit 869f419a, rejected -- see
# docs/phase1c/PHASE_1C_A_V2_CONTENT_AUDIT_REJECTED.md):
#   * V2 receipts were stale (asserted a 22-rule pre-expansion hash); v3
#     follows the receipt generation order in section 10 of the controller
#     authorisation to prevent stale receipts.
#   * V2 had fewer than six qualifying LA / nearby Southern-California
#     market-reference records once Wikipedia and the national Thumbtack
#     cost guide were excluded; v3 supplies six qualifying LA / SoCal
#     provider or LA-marketplace observations, with supplementary national
#     and encyclopedia context segregated and explicitly labelled.
#   * V2 contained miscited evidence references inside several rule
#     narratives (e.g. citing HFLA-EVD-005 "Paint On Your Face" when
#     EVD-005 was actually a Google Ads policy page); v3 narratives cite
#     the correct IDs.
#   * V2 compressed thirty independent CEO publication decisions into
#     ten projection slots; v3 supplies thirty projection records, each
#     governing exactly one statement or operational instruction.
#   * V2 had no rule for a 30-minute overtime increment; v3 adds
#     HFLA-RULE-BP-005.
#   * V2 had no rule or blocker for photo / video / privacy consent at
#     customer events; v3 adds HFLA-RULE-SC-005 and HFLA-BLK-031.
#   * V2 had no explicit interaction between the travel-fee policy and
#     the proposed two-hour minimum; v3 adds HFLA-RULE-QT-004 and
#     HFLA-BLK-032.
#   * V2 had no rule explicitly forbidding quote-operator off-script
#     promises; v3 adds HFLA-RULE-CI-004 and HFLA-BLK-033.
#
# All seven canonical rule categories are present.  Five projected
# consumer channels each have exactly one corresponding DRAFT activation.
# Exactly one DRAFT ReleaseRecord shell is present.  Every blocker has
# blocks_phase_1c_content_loading=false (ordinary CEO business
# decisions, none block intake).

# ===========================================================================
# 1. RULES -- 33 DRAFT governance rules across all 7 canonical categories
# ===========================================================================
rules:

  # ---- PUBLIC_PRICING (9 rules) -------------------------------------------
  - rule_id: "HFLA-RULE-PP-001"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Public headline price floor -- Face Painting Parties from $150"
    status: "DRAFT"
    draft_recommendation: >
      Adopt 'Face Painting Parties from $150' as the public headline
      price-floor statement across the website, Google Ads landing copy,
      and chatbot pricing intro.  The $150 figure matches the live
      homepage and pricing-page statement ('Bookings start at $150',
      HFLA-EVD-001 and HFLA-EVD-003, verified 2026-05-24).  LA per-hour
      comparator HFLA-EVD-008 (Paint On Your Face, $120/hr face painting
      with a 2-hour minimum, ~$240 effective minimum) places HFLA's
      $150 entry tier deliberately below the LA per-hour effective
      minimum for shorter parties, supporting the Color Pop entry tier
      defined in HFLA-RULE-PP-007.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required: confirm $150 public headline floor and
      'Face Painting Parties from $150' wording.  Decision captured in
      HFLA-BLK-001.

  - rule_id: "HFLA-RULE-PP-002"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Color Pop Face Painting -- public entry-tier package, from $150"
    status: "DRAFT"
    draft_recommendation: >
      Publish a named entry-tier public package -- 'Color Pop Face
      Painting' -- at a starting price of $150 for: 1 face-painting
      artist, 1 hour of service, intended for up to 10 children (subject
      to confirmation in the quote), compact event-menu designs
      (cheek art and small full-face designs).  This package matches
      the live homepage / pricing-page 'Bookings start at $150' anchor
      (HFLA-EVD-001, HFLA-EVD-003).  LA per-hour comparator
      HFLA-EVD-008 (Paint On Your Face $120/hr face + 2-hr minimum,
      ~$240 effective minimum) places the Color Pop 1-hour price at a
      deliberate accessibility premium for shorter parties.  All public
      channels (website, ads, chatbot, operator scripts) reference
      Color Pop as the entry anchor.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: authorise the Color Pop package name, the
      $150 entry price, the 1-hour / 1-artist parameters, and the
      'up to 10 children, subject to confirmation' framing.  Decision
      captured in HFLA-BLK-021.

  - rule_id: "HFLA-RULE-PP-003"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Birthday Favorite -- public mid-tier package, from $275"
    status: "DRAFT"
    draft_recommendation: >
      Publish a named mid-tier public package -- 'Birthday Favorite' --
      at a starting price of $275 for: 1 face-painting artist, 2 hours
      of service, intended for up to 18 children (subject to
      confirmation in the quote), party-menu designs (full-face designs,
      cheek art, mini-balloon add-ons optional).  $275 / 2-hour
      positioning sits below Paint On Your Face's $120/hr × 2-hr
      minimum = $240 base plus typical travel uplift (HFLA-EVD-008),
      and slightly above the Thumbtack national typical fixed price
      of ~$269 (HFLA-EVD-S-001 supplementary national context).  This
      mid-tier converts the most common LA birthday-party booking
      shape (~2 hours, ~15-18 kids) without sending the customer to
      a full quote conversation, and forms a clear ladder above
      Color Pop (HFLA-RULE-PP-002).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: authorise the Birthday Favorite package
      name, the $275 mid-tier price, the 2-hour / 1-artist parameters,
      and the 'up to 18 children, subject to confirmation' framing.
      Decision captured in HFLA-BLK-021.

  - rule_id: "HFLA-RULE-PP-004"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Enhancements by quote -- glitter tattoos and face gems"
    status: "DRAFT"
    draft_recommendation: >
      Glitter tattoos and face-gem enhancements are offered as add-ons
      to any primary service booking.  Currently listed as
      'Request a quote' on the live pricing page (HFLA-EVD-003,
      verified 2026-05-24).  Public-channel and chatbot wording must
      use 'Enhancements by quote' rather than implying a fixed
      add-on price.  CEO must decide whether to publish a specific
      add-on starting price or maintain quote-only.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-007.

  - rule_id: "HFLA-RULE-PP-005"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Balloon twisting by quote -- standalone and combination"
    status: "DRAFT"
    draft_recommendation: >
      Balloon twisting (standalone) and face painting + balloon
      twisting (combined) are offered by custom quote.  Currently
      listed on the live pricing page as 'Face Painting + Balloons
      Package -- Request a quote' (HFLA-EVD-003).  LA comparator
      HFLA-EVD-008 (Paint On Your Face) publishes $130/hour for
      balloon twisting with a 2-hour minimum.  Public channels must
      use 'Balloon twisting by quote' wording.  CEO must decide
      whether to publish a combined-package starting price (e.g.
      $250) or maintain quote-only.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-006.

  - rule_id: "HFLA-RULE-PP-006"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Schools, festivals, corporate and high-volume events -- custom quote"
    status: "DRAFT"
    draft_recommendation: >
      Schools, school carnivals, fundraisers, festivals, camps,
      corporate events, mall activations, and any high-volume event
      are served by custom quote with multiple artists available
      (live pricing page, HFLA-EVD-003).  Public wording on website,
      ads, chatbot and operator scripts must use 'Custom quote for
      schools, festivals and corporate events.'  No fixed public
      price for these segments.  Premium-tier comparator HFLA-EVD-010
      (Face Painting LA, serving Paramount, Casamigos, NFL Network,
      Sephora, Wet n Wild) demonstrates that quote-only corporate
      positioning is a defensible LA-market norm.  Marketplace
      breadth HFLA-EVD-011 (Thumbtack LA directory) shows 17+ active
      face-painter pros routinely staffing school events; HFLA must
      defend margin via a minimum booking fee.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: confirm the wording and set minimum
      booking fees for school/festival/corporate.  Decisions in
      HFLA-BLK-008 (school/festival minimum), HFLA-BLK-009
      (corporate invoice terms).

  - rule_id: "HFLA-RULE-PP-007"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Hourly rate stance -- flat package vs published per-hour rate"
    status: "DRAFT"
    draft_recommendation: >
      LA-area direct comparators publish per-hour starting rates
      with a two-hour minimum (HFLA-EVD-008 Paint On Your Face
      $120/hr face, $130/hr balloon, 2-hour minimum).  HFLA today
      publishes flat package pricing only.  CEO must decide whether
      to (A) keep the flat-package model defined by HFLA-RULE-PP-002
      and HFLA-RULE-PP-003, (B) add an explicit per-hour rate with
      a two-hour minimum to match LA discoverability norms, or
      (C) hybrid: published package prices plus a published per-hour
      overage rate beyond the package duration.  This decision
      cascades into HFLA-RULE-QT-004 (travel × two-hour interaction)
      and into ad copy / chatbot replies.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-008"
    internal_notes: >
      CEO decision required.  Decision captured in HFLA-BLK-019.

  - rule_id: "HFLA-RULE-PP-008"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Tiered deposit policy -- $50 below $300, 30 percent at or above $300"
    status: "DRAFT"
    draft_recommendation: >
      Adopt a tiered deposit policy: for total quoted booking value
      below $300, collect a flat $50 non-refundable deposit; for
      total quoted booking value at or above $300, collect a 30
      percent non-refundable deposit (rounded up to the nearest
      whole dollar).  Both tiers remain non-refundable and apply
      toward the final balance.  This replaces the current flat $50
      deposit (HFLA-EVD-002 live booking-policy page).  Rationale:
      as multi-service, multi-artist, school, festival and corporate
      bookings raise ticket size above $300, a flat $50 hold becomes
      disproportionately small relative to the artist-time
      commitment; 30 percent aligns with entertainment-booking norms
      and protects against late-cancellation losses on larger
      events.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm the tiered structure, the $300
      threshold, the 30 percent rate, and that both tiers remain
      non-refundable.  Decision captured in HFLA-BLK-022.

  - rule_id: "HFLA-RULE-PP-009"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Balance due timing -- full payment day-of before services begin"
    status: "DRAFT"
    draft_recommendation: >
      The remaining balance (quoted total minus deposit) is due on
      the event day before the artist begins services (live
      booking-policy page, HFLA-EVD-002, verified 2026-05-24).  This
      timing must be disclosed in booking confirmation, in quote
      communication, and on the public booking-policy page.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      No new CEO blocker -- payment timing is current practice and
      already publicly disclosed.  Confirm wording consistency under
      HFLA-BLK-003 (deposit confirmation).

  # ---- BOOKING_POLICY (5 rules) -------------------------------------------
  - rule_id: "HFLA-RULE-BP-001"
    rule_category: "BOOKING_POLICY"
    rule_title: "Cancellation policy -- deposit forfeiture and notice window"
    status: "DRAFT"
    draft_recommendation: >
      The deposit (HFLA-RULE-PP-008 tier) is non-refundable upon
      cancellation.  The cancellation notice window (number of days
      advance notice required for any consideration of deposit
      credit toward a future booking) must be defined and published.
      The live booking-policy page (HFLA-EVD-002) states the
      deposit is non-refundable but does not currently state the
      cancellation notice window.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: cancellation window in days.  Decision
      in HFLA-BLK-013.

  - rule_id: "HFLA-RULE-BP-002"
    rule_category: "BOOKING_POLICY"
    rule_title: "Rescheduling policy -- one-time deposit transfer subject to availability"
    status: "DRAFT"
    draft_recommendation: >
      The deposit may be transferred one time to a new event date
      with advance notice, subject to artist availability (live
      booking-policy page, HFLA-EVD-002, verified 2026-05-24).
      CEO must confirm the minimum advance notice required for a
      reschedule transfer and confirm the one-transfer cap.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-014.

  - rule_id: "HFLA-RULE-BP-003"
    rule_category: "BOOKING_POLICY"
    rule_title: "Overtime protocol -- pre-approval required before scheduled end"
    status: "DRAFT"
    draft_recommendation: >
      Overtime must be requested by the client and approved by the
      lead artist before the scheduled end time (live booking-policy
      page, HFLA-EVD-002).  If approved, overtime is added to the
      final balance at the operator-set overtime rate.  See
      HFLA-RULE-BP-005 for the recommended billing increment.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: overtime rate per hour.  Decision in
      HFLA-BLK-010.

  - rule_id: "HFLA-RULE-BP-004"
    rule_category: "BOOKING_POLICY"
    rule_title: "Weather and outdoor-conditions policy -- safe-conditions requirement"
    status: "DRAFT"
    draft_recommendation: >
      Outdoor events require a shaded, protected setup area away
      from direct sun, rain, strong wind, sprinklers, smoke, dust
      and unsafe heat (live booking-policy language, HFLA-EVD-002).
      If conditions are unsafe, services may need to move indoors,
      pause or be adjusted for safety.  The weather cancellation
      and partial-refund policy must be defined.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: weather cancellation client credit /
      refund policy.  Decision in HFLA-BLK-015.

  - rule_id: "HFLA-RULE-BP-005"
    rule_category: "BOOKING_POLICY"
    rule_title: "Overtime billing increment -- 30-minute half-hour blocks"
    status: "DRAFT"
    draft_recommendation: >
      Recommendation: additional time beyond the scheduled end,
      when artist availability permits and client and artist
      agree before the scheduled end time, is billed in 30-minute
      increments using the applicable half-hour rate.  Half-hour
      rate is derived from the per-hour rate set under HFLA-BLK-010
      (overtime hourly rate).  Rationale: a half-hour minimum
      respects family-event pacing (an extra block is typically a
      15- to 45-minute extension rather than a full hour) and
      reduces friction in the end-of-event approval conversation.
      Exact half-hour amount remains a CEO decision pending
      confirmation of the underlying overtime hourly rate.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm 30-minute increment and the
      half-hour rate (derived from the HFLA-BLK-010 hourly rate).
      Decision captured in HFLA-BLK-030.

  # ---- QUOTE_TRAVEL (4 rules) ---------------------------------------------
  - rule_id: "HFLA-RULE-QT-001"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Approved local service zone -- three-county coverage"
    status: "DRAFT"
    draft_recommendation: >
      Happy Faces LA serves Los Angeles County, Orange County, and
      Ventura County (live homepage and booking-policy page,
      HFLA-EVD-001 and HFLA-EVD-002, verified 2026-05-24).  Public
      wording must list these three counties as the approved local
      service zone.  Outside this zone, bookings are accepted only
      on case-by-case CEO approval with a custom travel quote.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      No CEO blocker on coverage area -- current published practice.
      Confirm under HFLA-BLK-027 (dispatch model).

  - rule_id: "HFLA-RULE-QT-002"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Public ZIP / event-location request wording on quote intake"
    status: "DRAFT"
    draft_recommendation: >
      Every public quote intake surface (website contact form,
      Google Ads landing page, chatbot intake) must request the
      event ZIP code or city and the event street address before
      a quote is returned.  Public wording: 'Please share your
      event ZIP or city so we can confirm coverage and any
      travel fee.'  This wording supports the travel-fee
      calculation method governed by HFLA-RULE-QT-003 and the
      travel × two-hour interaction governed by HFLA-RULE-QT-004.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm public wording.  Decision in
      HFLA-BLK-004.

  - rule_id: "HFLA-RULE-QT-003"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Travel fee calculation method -- zone or mileage"
    status: "DRAFT"
    draft_recommendation: >
      Travel may be included or added depending on event location,
      distance, traffic, parking, and total booking size (live
      booking-policy language, HFLA-EVD-002).  CEO must select the
      calculation method: (A) flat per-zone (e.g. LA-base /
      OC-premium / Ventura-premium), (B) per-mile mileage rate
      from a home base, (C) by-city flat fee, or (D) hybrid (flat
      LA base, premiums for OC and Ventura).  Method must be
      documented for operator use; whether the method is
      additionally publicly disclosed is a separate decision.
      LA market context: HFLA-EVD-S-001 (Thumbtack national cost
      guide, supplementary) notes competitors commonly charge a
      separate travel fee or impose a minimum-hours requirement
      for distant events.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: travel fee method + per-zone amounts.
      Decisions in HFLA-BLK-004 (method) and HFLA-BLK-005
      (per-county premiums).

  - rule_id: "HFLA-RULE-QT-004"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Travel fee × two-hour minimum interaction"
    status: "DRAFT"
    draft_recommendation: >
      If CEO authorises an explicit two-hour minimum under
      HFLA-RULE-PP-007 option (B) or (C), the interaction with
      travel fees must be governed explicitly: (a) does the
      two-hour minimum apply only to the LA base zone or to
      every event regardless of zone? (b) is the travel fee
      additive to the two-hour minimum (e.g. $X travel + 2-hour
      package), or is the two-hour minimum waived when the
      travel fee exceeds a threshold? (c) for events outside
      the approved local service zone (HFLA-RULE-QT-001), does
      the two-hour minimum become a three-hour minimum?  Without
      explicit interaction rules, operators will quote
      inconsistently for OC and Ventura events that travel
      farther but commit less time on-site.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-008"
    internal_notes: >
      CEO decision required: interaction rules.  Decision captured
      in HFLA-BLK-032.  Resolves only after HFLA-BLK-019
      (hourly stance) and HFLA-BLK-004 / HFLA-BLK-005 (travel
      method) are decided.

  # ---- VENDOR_SCHOOL_CORPORATE (3 rules) ----------------------------------
  - rule_id: "HFLA-RULE-VS-001"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "School and festival booth pricing -- minimum fee and multi-artist rate"
    status: "DRAFT"
    draft_recommendation: >
      School carnivals, fundraisers, festivals and camps are
      served with a high-throughput booth setup (live pricing
      page, HFLA-EVD-003).  Multiple artists are available.  No
      public minimum is currently stated.  LA marketplace
      breadth HFLA-EVD-011 (Thumbtack LA directory, 17+ active
      face-painter pros) and observed high-volume LA pros
      HFLA-EVD-012 (Tammy P, 629 hires) and HFLA-EVD-013
      (Funtastic Faces, 439 hires) confirm institutional events
      are a competitive segment requiring a defended minimum.
      CEO must authorise a minimum booking fee for school /
      festival engagements and the standard per-additional-artist
      hourly rate.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-008.

  - rule_id: "HFLA-RULE-VS-002"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "Corporate and company event pricing -- invoice terms"
    status: "DRAFT"
    draft_recommendation: >
      Corporate bookings (company picnics, city events, malls,
      brand activations) receive a custom setup, professional
      invoice and full-service entertainment station (live
      pricing page, HFLA-EVD-003).  Premium-tier comparator
      HFLA-EVD-010 (Face Painting LA -- Paramount, Casamigos,
      NFL Network, Sephora, Wet n Wild) operates a quote-only
      corporate model with an explicit retainer-fee payment
      flow.  CEO must authorise: corporate invoice payment
      window (e.g. net 7 or net 14), deposit structure for
      corporate accounts, and whether a corporate minimum
      booking size applies.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-009.

  - rule_id: "HFLA-RULE-VS-003"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "Vendor / community pilot program -- sponsored-design parameters"
    status: "DRAFT"
    draft_recommendation: >
      Authorise a controlled vendor / community pilot program
      with the following parameters:
        (a) Sponsored-design catalogue: a maximum of ten (10)
            sponsored face-paint designs may be offered to a
            vendor / community partner at any given time.
        (b) Exclusivity: while the pilot is active, HFLA is the
            HFLA-only-provider for the sponsored-design
            catalogue (no other face-paint operator may use the
            same sponsored designs in HFLA's three-county
            service area for the pilot duration).
        (c) Sponsorship disclosure: every customer-facing surface
            where a sponsored design appears must visibly
            identify the sponsorship (e.g. 'Sponsored by ...') --
            required for FTC endorsement-disclosure alignment
            and Google Ads Misrepresentation-policy compliance
            (HFLA-EVD-004).
        (d) Continuity of paid services: paid face-painting
            bookings continue uninterrupted during the pilot --
            the pilot is additive, not a free-only operating
            mode.
        (e) Family attendance: a member of the sponsor's family
            or a designated brand-side representative is
            expected to attend each sponsored-design event for
            brand-fit oversight.
        (f) Case-by-case CEO approval: each sponsored-design
            booking request is reviewed and approved
            individually by the CEO before confirmation -- no
            general pre-approval is granted.
      The pilot is INTERNAL until CEO approves all six
      parameters and authorises specific sponsor partners.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-004"
    internal_notes: >
      CEO decision required.  Decision captured in HFLA-BLK-023.
      No customer-facing content for this pilot is generated
      until CEO confirms parameters.

  # ---- SAFETY_CARE (5 rules) -----------------------------------------------
  - rule_id: "HFLA-RULE-SC-001"
    rule_category: "SAFETY_CARE"
    rule_title: "Product safety -- cosmetic-grade, FDA color-additive-compliant materials"
    status: "DRAFT"
    draft_recommendation: >
      Face painting, glitter tattoo and face-gem products must
      meet cosmetic-grade safety standards and use only color
      additives permitted by the U.S. FDA for skin application
      (per the FDA color-additive status list referenced
      in HFLA-EVD-007 'Hypoallergenic Cosmetics' and in
      HFLA-EVD-S-002 supplementary context).  California
      Proposition 65 lead-limit requirements on cosmetic
      additives must also be met.  CEO must confirm the brand
      list HFLA artists may use and confirm whether an
      allergy / sensitivity prompt is added to the public
      booking-policy page and to the operator quote intake form.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-007"
    internal_notes: >
      CEO decision required: approved brand list and allergy
      prompt wording.  Decision in HFLA-BLK-020.

  - rule_id: "HFLA-RULE-SC-002"
    rule_category: "SAFETY_CARE"
    rule_title: "Safety marketing claim -- do not publish unqualified 'hypoallergenic'"
    status: "DRAFT"
    draft_recommendation: >
      Per the U.S. FDA ('Hypoallergenic Cosmetics', content
      current as of 2022-02-25, HFLA-EVD-007), there are no
      federal standards or definitions governing the term
      'hypoallergenic' for cosmetics; the term 'has no real
      meaning in the marketplace.'  HFLA channel copy (website,
      ads, chatbot, operator scripts) must NOT use the
      unqualified claim 'hypoallergenic' for face paint, glitter
      or gem products.  Preferred customer-facing language:
      'cosmetic-grade, FDA color-additive compliant'.  LA
      comparator HFLA-EVD-009 (BubbleMania & Co.) publishes the
      unqualified 'hypoallergenic' claim -- HFLA must
      deliberately differentiate by using more accurate
      language.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-007"
    internal_notes: >
      CEO decision required: confirm preferred safety language
      across all public channels.  Decision in HFLA-BLK-020.

  - rule_id: "HFLA-RULE-SC-003"
    rule_category: "SAFETY_CARE"
    rule_title: "Insurance and certificate-of-insurance issuance"
    status: "DRAFT"
    draft_recommendation: >
      HFLA must maintain general-liability insurance covering
      bodily injury, property damage and product / completed
      operations for face-painting and balloon-twisting services.
      School, festival and corporate clients commonly require a
      Certificate of Insurance (COI) naming the venue or host
      organisation as additional insured.  CEO must confirm:
      (a) active general-liability carrier and limits;
      (b) whether HFLA's policy supports adding venues / hosts
      as additional insured on a per-event basis;
      (c) the turnaround SLA for issuing a COI when a school or
      corporate client requests one;
      (d) whether COI issuance is included in the base booking
      fee or carries a service charge.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision captured in HFLA-BLK-024.

  - rule_id: "HFLA-RULE-SC-004"
    rule_category: "SAFETY_CARE"
    rule_title: "Customer-facing tax and fee disclosure"
    status: "DRAFT"
    draft_recommendation: >
      Customer-facing quote and invoice surfaces must disclose
      whether any tax or surcharge is added to the quoted
      package price.  Per California Department of Tax and Fee
      Administration guidance, service-only labor is generally
      not subject to sales tax in California; however
      operator-side invoice templates must be consistent with
      the chosen treatment.  CEO must confirm: (a) whether any
      tax / surcharge appears on the customer invoice; (b) the
      exact disclosure wording on the website pricing page and
      in the booking confirmation; (c) 1099-NEC reporting
      workflow for face-paint artists treated as independent
      contractors; (d) W-9 collection workflow for corporate
      clients.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision captured in HFLA-BLK-029.

  - rule_id: "HFLA-RULE-SC-005"
    rule_category: "SAFETY_CARE"
    rule_title: "Photo, video and customer-image privacy consent at events"
    status: "DRAFT"
    draft_recommendation: >
      At customer events HFLA artists, partners, and any
      sponsor representatives must NOT photograph or video
      face-painted guests (children or adults) for any HFLA or
      partner use (social media post, website portfolio,
      marketing material, Google Ads asset, vendor pilot
      promotional surface) without prior explicit written
      consent from the booking customer or the parent /
      guardian of any depicted minor.  Internal-only event
      coverage (private operator review, COI claim
      documentation, internal QA) is permitted but must remain
      internal-only and unpublished.  The booking confirmation
      and the live booking-policy page must include a clear
      'Photo / video consent' section describing what HFLA may
      and may not publish, and providing the customer the
      option to opt out by checking a box at booking
      confirmation.  This rule covers a v2 governance gap (v2
      contained no photo-consent rule despite HFLA's primary
      service producing identifiable depictions of children).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm consent wording, opt-out
      mechanism, and the explicit ban on unconsented
      sponsor-side photography.  Decision captured in
      HFLA-BLK-031.  Interacts with HFLA-RULE-VS-003 (vendor
      pilot) and HFLA-RULE-CI-004 (operator no-unapproved
      promises).

  # ---- AI_CUSTOMER_RESPONSE (3 rules) -------------------------------------
  - rule_id: "HFLA-RULE-AR-001"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "Chatbot pricing disclosure -- scope and accuracy limits"
    status: "DRAFT"
    draft_recommendation: >
      The customer-facing chatbot may state the public
      'Face Painting Parties from $150' starting price
      (HFLA-RULE-PP-001), the Color Pop and Birthday Favorite
      package names and starting prices (HFLA-RULE-PP-002 and
      HFLA-RULE-PP-003), and direct the customer to the quote
      form for any specific event price.  The chatbot must
      NOT quote a final price for a specific event because
      pricing depends on guest count, travel, and service mix.
      CEO must approve the precise pricing-disclosure language.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-017.

  - rule_id: "HFLA-RULE-AR-002"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "Chatbot escalation -- human-quote and prohibited-promises guardrail"
    status: "DRAFT"
    draft_recommendation: >
      When a chatbot user requests a specific final price,
      service customisation, school / festival / corporate
      quote, multi-artist booking, COI issuance, sponsorship,
      or any commitment beyond the published Color Pop or
      Birthday Favorite package, the chatbot must escalate to
      the human quote form (happyfacesla.com/contact/) or to
      the phone number 818-619-5506 rather than attempting to
      provide a binding answer.  Prohibited chatbot promises
      include: discounts, guaranteed pricing for non-published
      packages, COI issuance commitments, specific artist
      assignment, weather guarantees, and any partner / sponsor
      commitment.  Escalation language must be CEO-approved.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-017.

  - rule_id: "HFLA-RULE-AR-003"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "Copilot internal decision-support -- DRAFT-not-policy and PII boundary"
    status: "DRAFT"
    draft_recommendation: >
      The COPILOT_INTERNAL_DECISION_SUPPORT channel MUST
      present all governance content as DRAFT recommendations,
      not approved policy, until CEO releases a specific rule
      or projection.  Copilot internal projections, prompts
      and operator-facing decision aids MUST NOT contain
      customer personally identifiable information: customer
      name, customer email, customer phone, event address,
      billing address, client name, contact email, contact
      phone, lead name, quote recipient, or booking contact
      (canonical PII-field set already enforced by the
      validator's PII_FIELD_NAMES gate).  PII may continue to
      flow through the operator's quote workflow and through
      the restricted operations workbook but MUST be redacted
      before any content is presented to or generated by
      Copilot.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-005"
    internal_notes: >
      CEO decision required: confirm PII-redaction workflow
      and operator training acknowledgement.  Decision
      captured in HFLA-BLK-025.

  # ---- CHANNEL_IMPLEMENTATION (4 rules) -----------------------------------
  - rule_id: "HFLA-RULE-CI-001"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Google Ads landing-page parity and eligibility"
    status: "DRAFT"
    draft_recommendation: >
      Every price or package claim in a Google Ads headline,
      description, or sitelink (e.g. 'Face Painting Parties
      from $150', 'Color Pop from $150', 'Birthday Favorite
      from $275') must exactly match the price and package
      wording on the ad's landing page.  Per the Google Ads
      Misrepresentation policy (HFLA-EVD-004), ads must not
      omit pricing conditions, must not use dishonest pricing
      practices, and must not promise products / services /
      promotional offers that are unavailable on the
      destination page.  Landing page must be functional,
      useful and easy to navigate per Google Ads editorial
      requirements (HFLA-EVD-005).  All ad copy must be
      CEO-approved before the campaign launches.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-004"
    internal_notes: >
      CEO decision required: Google Ads campaign
      authorisation.  Decision in HFLA-BLK-016.

  - rule_id: "HFLA-RULE-CI-002"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Google Responsive Search Ad spec compliance -- character limits"
    status: "DRAFT"
    draft_recommendation: >
      Any Google Ads responsive search ad authored for HFLA
      must conform to the Google Ads RSA specification
      (HFLA-EVD-006):
        - Headlines: up to 30 characters each, 3 minimum / 15
          maximum per ad.
        - Descriptions: up to 90 characters each, 2 minimum /
          4 maximum per ad.
        - Display path: up to 15 characters per path field.
      Every candidate headline (HFLA-PROJ-ADS-001 through
      HFLA-PROJ-ADS-003) and description (HFLA-PROJ-ADS-004
      and HFLA-PROJ-ADS-005) has been pre-checked against
      these limits.  CEO / operator must re-verify any
      revised wording against the limits before pasting into
      Google Ads.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-006"
    internal_notes: >
      No standalone CEO blocker -- this rule is a hard
      technical compliance requirement, not a business
      choice.  Reviewed jointly under HFLA-BLK-016.

  - rule_id: "HFLA-RULE-CI-003"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Paid-ad spend gate -- $100 cumulative cap requires CEO re-authorisation"
    status: "DRAFT"
    draft_recommendation: >
      No Google Ads campaign authored under this governance
      package may exceed one hundred US dollars ($100) of
      cumulative paid-ad spend without explicit CEO
      re-authorisation.  When cumulative spend on the active
      campaign reaches $100, the campaign must be paused at
      the Google Ads account level until the CEO approves a
      new spend tranche (or a budgeted weekly / monthly
      amount) in writing.  Pairs with HFLA-RULE-CI-001
      (claim accuracy) and HFLA-RULE-CI-002 (RSA spec
      compliance).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-005"
    internal_notes: >
      CEO decision required: confirm the $100 cap and the
      pause / re-authorise workflow.  Decision captured in
      HFLA-BLK-026.

  - rule_id: "HFLA-RULE-CI-004"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Quote operator -- no unapproved promises and approved-script discipline"
    status: "DRAFT"
    draft_recommendation: >
      Quote operators handling phone, text and email
      inquiries must follow the CEO-approved quote-operator
      script (governed by HFLA-PROJ-QOP-001 through
      HFLA-PROJ-QOP-005) and MUST NOT make any
      customer-facing promise outside that script.
      Prohibited operator promises include:
      (a) discounts not pre-approved;
      (b) prices for unpublished packages;
      (c) commitments to a specific artist by name;
      (d) COI turnaround SLAs not authorised under
          HFLA-BLK-024;
      (e) weather, parking or venue guarantees;
      (f) sponsor / pilot commitments;
      (g) any promise the operator could not personally
          deliver if the booking were confirmed today.
      Any deviation from the approved script must be
      escalated to the CEO before being communicated to
      the customer.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm the prohibited-promise
      list and the operator-side escalation workflow.
      Decision captured in HFLA-BLK-033.

