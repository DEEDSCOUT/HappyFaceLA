  # ---- OFFICIAL_POLICY (4 records) ---------------------------------------
  - evidence_id: "HFLA-EVD-004"
    source_category: "OFFICIAL_POLICY"
    source_name: "Google Ads -- Misrepresentation policy"
    source_locator: "https://support.google.com/adspolicy/answer/6020955"
    access_or_extraction_date: "2026-05-24"
    verified_fact: >
      Google Ads Misrepresentation policy prohibits, among other
      things: 'Failure to clearly and conspicuously disclose the
      payment model or full expense that a user will bear before
      and after purchase' (Dishonest pricing practices); 'Making
      misleading statements, obscuring, or omitting material
      information about your identity, affiliations, or
      qualifications' (Misleading representation); 'Promising
      products, services, or promotional offers in the ad that
      are unavailable or aren't easily found from the
      destination' (Unavailable offers); 'Making inaccurate
      claims or claims that entice the user with an improbable
      result' (Unreliable claims).  Account suspension without
      prior warning is the stated enforcement action for
      egregious violations.
    related_rule_ids:
      - "HFLA-RULE-CI-001"
      - "HFLA-RULE-VS-003"
    reliability_tier: "TIER_1_PRIMARY"
