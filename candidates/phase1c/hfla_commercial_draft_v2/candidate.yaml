# Happy Faces LA — Phase 1C Commercial Candidate Package
# Version: DRAFT v2
# Purpose: CEO-review commercial candidate — pricing, booking, channel,
#          safety, and AI-response governance rules for the live commercial
#          website and paid-channel launch.
# Status: DRAFT — NO RECORDS ARE APPROVED OR LIVE.
# Intake gate: validate-phase1c-input -c config -i candidates/phase1c/hfla_commercial_draft_v2
#
# All seven governance rule categories are present.  Five projected channels
# each have exactly one corresponding DRAFT activation.  Exactly one DRAFT
# ReleaseRecord shell is present.  All blockers are ordinary CEO/business
# decisions with blocks_phase_1c_content_loading=false.
#
# Research date: 2026-05-24
# Source classes: VERIFIED_CURRENT_FACT (live HFLA pages),
#                 MARKET_REFERENCE (Los Angeles competitor / marketplace data),
#                 OFFICIAL_POLICY (FDA, Google Ads policy center).
#
# Changes from v1 (2025-07-21):
#   * All evidence dates refreshed to 2026-05-24 (re-observed live).
#   * Six distinct MARKET_REFERENCE evidence records replace the v1 placeholder
#     market-research entry: Paint On Your Face, BubbleMania & Co., Face
#     Painting LA, Thumbtack LA face-painter directory, Thumbtack national
#     face-painting cost guide, and Wikipedia body-painting reference (used
#     for FDA color-additive and California Proposition 65 framing).
#   * Three new rules added to address market-evidence shifts:
#       - HFLA-RULE-PP-006 (hourly rate stance + 2-hour minimum norm)
#       - HFLA-RULE-SC-003 (FDA-compliant cosmetic-grade language; do not
#         publish unqualified "hypoallergenic" claim — FDA states the term
#         has no federal definition)
#       - HFLA-RULE-CI-002 (Google Ads RSA character-limit compliance:
#         30-char headlines, 90-char descriptions, 15-char display paths)
#   * Two new CEO blockers (HFLA-BLK-019, HFLA-BLK-020) added for the new
#     market-driven rules.  Pre-existing blockers retained unchanged in
#     business intent; phrasing refreshed where the market data sharpens
#     the choice (e.g. HFLA-BLK-002 explicit $120/hr LA comparator).
#   * Two pre-existing rules refined with market context (HFLA-RULE-PP-001
#     and HFLA-RULE-SC-002).  No rule_id renamed; no field removed.
#
# All records are DRAFT.  Nothing is APPROVED, RELEASED, or ACTIVE.

# ---------------------------------------------------------------------------
# 1. RULES — 29 DRAFT governance rules across all 7 canonical categories
# ---------------------------------------------------------------------------

rules:

  # ---- PUBLIC_PRICING (9 rules) -------------------------------------------

  - rule_id: "HFLA-RULE-PP-001"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Minimum booking price floor — single service, single artist"
    status: "DRAFT"
    draft_recommendation: >
      Publish $150 as the public-facing minimum booking price for a single
      service (face painting OR balloon twisting) with one dedicated artist.
      This figure is currently stated on the live homepage, pricing page, and
      booking-policy page (verified 2026-05-24).  LA-area market evidence
      (HFLA-EVD-005, HFLA-EVD-006, HFLA-EVD-008) shows direct competitors
      starting at $120/hour with a 2-hour minimum (Paint On Your Face), and a
      Thumbtack national average fixed price band of $208–$348 with most
      events around $269.  HFLA's $150 minimum sits at the accessible end of
      the LA professional market; the floor should be listed on the pricing
      page, confirmed in every quote, and repeated in the chatbot pricing
      intro so all channels show a consistent starting figure.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required: confirm $150 floor is authorised for all public
      channels and chatbot.  Decision captured in HFLA-BLK-001.

  - rule_id: "HFLA-RULE-PP-002"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Deposit amount — $50 non-refundable booking hold"
    status: "DRAFT"
    draft_recommendation: >
      Charge a $50 non-refundable deposit to hold the event date.  The deposit
      is applied toward the final balance.  This amount is currently stated on
      the booking policy page and on the homepage 'Why parents book' block
      (verified 2026-05-24).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm $50 deposit amount or adjust.
      Decision captured in HFLA-BLK-003.

  - rule_id: "HFLA-RULE-PP-003"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Balance due timing — full payment day-of before services begin"
    status: "DRAFT"
    draft_recommendation: >
      The remaining balance (total quote minus deposit) is due on the event
      day before the artist begins services.  This rule governs the payment
      timeline and must be disclosed in booking confirmation, quote
      communication, and the booking policy page (currently stated on the
      live booking-policy page, verified 2026-05-24).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      No unresolved CEO blocker — payment terms are current practice.
      Confirm for public disclosure consistency in HFLA-BLK-003.

  - rule_id: "HFLA-RULE-PP-004"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Multi-service and multi-artist pricing approach"
    status: "DRAFT"
    draft_recommendation: >
      Quotes for face painting + balloon twisting combined (or any two-service
      setup) are provided on request.  No public fixed price exists for
      multi-service packages.  LA market comparator: Paint On Your Face
      publishes per-service hourly starting rates ($120 face / $130 balloon
      / $135 caricature) with a 2-hour minimum — implying a combined starting
      band roughly $250–$300 for a 2-hour two-service event before travel.
      CEO must decide whether to publish a starting price for combined
      packages or maintain quote-only.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: authorise a published combined-package starting
      price (e.g. $250) or maintain quote-only.  Decision in HFLA-BLK-006.

  - rule_id: "HFLA-RULE-PP-005"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Add-on service pricing — glitter tattoos and face gems"
    status: "DRAFT"
    draft_recommendation: >
      Glitter tattoos and face gems are offered as add-ons to any primary
      service booking.  Currently listed as 'Request a quote' on the pricing
      page (verified 2026-05-24).  CEO must decide whether to publish an
      add-on starting price or maintain quote-only for add-ons.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-007.

  - rule_id: "HFLA-RULE-PP-006"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Hourly rate stance — published per-hour rate vs. flat starting price"
    status: "DRAFT"
    draft_recommendation: >
      LA-area competitor pages (Paint On Your Face, Thumbtack pros, Thumbtack
      cost guide) typically publish a per-hour starting rate with a 2-hour
      minimum.  HFLA today publishes a flat starting price ('Bookings start at
      $150') without an explicit hourly rate or minimum-hours statement.  CEO
      must decide whether to (A) keep the flat-floor model, (B) adopt an
      explicit per-hour rate with a 2-hour minimum to match competitor norms
      and reduce quote friction, or (C) hybrid (flat first-2-hours block plus
      per-hour overage).  This choice cascades to website copy, ad copy,
      chatbot replies, and operator quoting.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-005"
    internal_notes: >
      CEO decision required.  Decision captured in HFLA-BLK-019.  Market
      comparator evidence: HFLA-EVD-005 (Paint On Your Face $120/hr, 2-hr min)
      and HFLA-EVD-008 (Thumbtack cost guide: hourly examples $70–$125/hr,
      starting examples $95/hr with 2-hr minimum).

  - rule_id: "HFLA-RULE-PP-007"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Color Pop Face Painting — public entry-tier package, $150"
    status: "DRAFT"
    draft_recommendation: >
      Publish a named entry-tier public package — 'Color Pop Face Painting'
      — at a starting price of $150 for: 1 face-painting artist, 1 hour of
      service, up to 10 children, simple-design menu (cheek art and small
      full-face designs).  This package replaces the v1 ambiguous 'minimum
      booking' framing with a concrete, defensible public anchor that
      matches the live homepage and pricing-page 'Bookings start at $150'
      statement (HFLA-EVD-001, HFLA-EVD-003).  LA per-hour comparator
      HFLA-EVD-007 (Paint On Your Face $120/hr, 2-hr minimum, ~$240 effective
      minimum) places HFLA's $150 / 1-hour entry tier at a deliberate
      accessibility premium for shorter parties.  All channels (website,
      ads, chatbot, operator scripts) reference this package as the entry
      anchor.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: authorise the Color Pop package name, the
      $150 entry price, the 1-hour / 1-artist / ≤10-children parameters,
      and the design-menu scope.  Decision captured in HFLA-BLK-021.

  - rule_id: "HFLA-RULE-PP-008"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Birthday Favorite — public mid-tier package, $275"
    status: "DRAFT"
    draft_recommendation: >
      Publish a named mid-tier public package — 'Birthday Favorite' — at a
      starting price of $275 for: 1 face-painting artist, 2 hours of service,
      up to 18 children, full-design menu (full-face designs, cheek art,
      mini-balloon add-ons optional).  $275 / 2-hour positioning sits below
      Paint On Your Face's $120/hr × 2-hr min = $240 base (HFLA-EVD-007)
      plus typical travel-fee uplift, and slightly above Thumbtack's
      national typical fixed price of ~$269 (HFLA-EVD-008).  This mid-tier
      lets HFLA convert the most common LA birthday-party booking shape
      (~2-hour party, ~15–18 kids) without sending the customer to a full
      quote conversation.  Provides a clear ladder above Color Pop
      (HFLA-RULE-PP-007).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required: authorise the Birthday Favorite package name,
      the $275 mid-tier price, the 2-hour / 1-artist / ≤18-children
      parameters, and the design-menu scope.  Decision captured in
      HFLA-BLK-021.

  - rule_id: "HFLA-RULE-PP-009"
    rule_category: "PUBLIC_PRICING"
    rule_title: "Tiered deposit policy — $50 below $300, 30 percent at or above $300"
    status: "DRAFT"
    draft_recommendation: >
      Replace the flat $50 deposit (HFLA-RULE-PP-002, current live policy)
      with a tiered structure: for total quoted booking value below $300,
      collect a flat $50 non-refundable deposit; for total quoted booking
      value at or above $300, collect a 30 percent non-refundable deposit
      (rounded up to the nearest dollar).  Rationale: as multi-service,
      multi-artist, school, festival, and corporate bookings move HFLA's
      ticket size above $300, a flat $50 hold becomes disproportionately
      small relative to the artist-time commitment.  A 30 percent tier
      aligns with common entertainment-booking norms and protects against
      late-cancellation losses on larger events.  Both tiers remain
      non-refundable and continue to apply toward the final balance.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm tiered deposit structure, confirm the
      $300 threshold, and confirm the 30 percent rate.  Decision captured
      in HFLA-BLK-022.  If approved, supersedes the flat $50-only stance
      in HFLA-RULE-PP-002 for any quote at or above $300.

  # ---- BOOKING_POLICY (4 rules) -------------------------------------------

  - rule_id: "HFLA-RULE-BP-001"
    rule_category: "BOOKING_POLICY"
    rule_title: "Cancellation policy — deposit forfeiture and conditions"
    status: "DRAFT"
    draft_recommendation: >
      The $50 deposit is non-refundable upon cancellation.  The cancellation
      window (number of days advance notice) must be defined and published.
      The live booking-policy page (verified 2026-05-24) states the deposit
      is non-refundable; the advance-notice window is not currently specified
      publicly.  CEO must authorise a specific cancellation window.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: cancellation window in days.  Decision in
      HFLA-BLK-013.

  - rule_id: "HFLA-RULE-BP-002"
    rule_category: "BOOKING_POLICY"
    rule_title: "Rescheduling policy — one-time deposit transfer, subject to availability"
    status: "DRAFT"
    draft_recommendation: >
      The deposit may be transferred one time to a new event date with advance
      notice, subject to artist availability (live booking-policy language,
      verified 2026-05-24).  CEO must confirm the minimum advance notice
      required for a reschedule transfer and whether the one-transfer limit
      is correct.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-014.

  - rule_id: "HFLA-RULE-BP-003"
    rule_category: "BOOKING_POLICY"
    rule_title: "Overtime protocol — pre-approval required before scheduled end"
    status: "DRAFT"
    draft_recommendation: >
      Overtime must be requested and approved before the scheduled end time
      (live booking-policy language, verified 2026-05-24).  If approved,
      overtime is added to the final balance at the operator-set rate.  CEO
      must authorise the specific overtime hourly rate.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: overtime rate per hour.  Decision in HFLA-BLK-010.

  - rule_id: "HFLA-RULE-BP-004"
    rule_category: "BOOKING_POLICY"
    rule_title: "Last-minute booking — surcharge window and amount"
    status: "DRAFT"
    draft_recommendation: >
      Bookings requested within a short window before the event (e.g. 48 hours
      or less) may incur a last-minute surcharge to compensate for schedule
      disruption.  CEO must decide whether to implement a surcharge, the
      trigger window, and the amount.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-012.

  # ---- QUOTE_TRAVEL (3 rules) ---------------------------------------------

  - rule_id: "HFLA-RULE-QT-001"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Travel fee calculation — method and three-county service area"
    status: "DRAFT"
    draft_recommendation: >
      Happy Faces LA serves Los Angeles County, Orange County, and Ventura
      County (verified 2026-05-24 on homepage and booking-policy page).
      Travel may be included or added depending on event location, distance,
      traffic, parking, and total booking size.  The exact fee-calculation
      method (flat per zone, mileage rate, by-city flat, or hybrid) must be
      decided by the CEO and documented for operator use and optional public
      disclosure.  LA market comparator (HFLA-EVD-008 Thumbtack cost guide)
      shows competitors commonly charge a separate travel fee or set a
      minimum hours requirement for distant events.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: travel fee method.  Decisions in HFLA-BLK-004
      and HFLA-BLK-005.

  - rule_id: "HFLA-RULE-QT-002"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Parking and setup requirements — client responsibility"
    status: "DRAFT"
    draft_recommendation: >
      Client is responsible for providing safe, nearby parking or covering
      parking fees (live booking-policy language, verified 2026-05-24).
      Difficult parking, valet-only, gated access, stairs, or long walking
      distances may affect setup time and should be disclosed before
      booking.  This rule governs what the quote operator must confirm
      during the quote conversation.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      Current booking policy language is adequate.  No unresolved CEO blocker
      on this rule.

  - rule_id: "HFLA-RULE-QT-003"
    rule_category: "QUOTE_TRAVEL"
    rule_title: "Quote response SLA — public turnaround commitment"
    status: "DRAFT"
    draft_recommendation: >
      The website currently states 'expect a response with availability and
      pricing quickly' (verified 2026-05-24).  A specific SLA (e.g. within
      2 business hours or same business day) would strengthen the conversion
      promise on the pricing page and in Google Ads extensions.  CEO must
      decide whether to commit to a specific response window.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-018.

  # ---- VENDOR_SCHOOL_CORPORATE (3 rules) ----------------------------------

  - rule_id: "HFLA-RULE-VS-001"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "School and festival booth pricing — minimum fee and artist count"
    status: "DRAFT"
    draft_recommendation: >
      School carnivals, fundraisers, festivals, and camps are served with a
      high-throughput booth setup (live pricing page, verified 2026-05-24).
      Multiple artists are available.  No public minimum is currently stated.
      LA-area marketplace breadth (HFLA-EVD-007 Thumbtack LA directory) shows
      17+ active face-painter pros routinely staffing school events; HFLA
      should establish a defended minimum to protect margin on high-volume
      institutional engagements.  CEO must authorise a minimum booking fee
      for school/festival engagements and the standard multi-artist rate.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-008.

  - rule_id: "HFLA-RULE-VS-002"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "Corporate and company event pricing — invoice terms"
    status: "DRAFT"
    draft_recommendation: >
      Corporate bookings (company picnics, city events, malls) receive a
      custom setup, professional invoice, and full-service entertainment
      station (live pricing page, verified 2026-05-24).  Premium-tier
      LA competitors (HFLA-EVD-009 Face Painting LA) serve corporate clients
      including Paramount, Casamigos, NFL Network, Sephora, and Wet n Wild
      on a quote-only model, demonstrating that quote-only corporate pricing
      is a defensible LA-market norm.  CEO must authorise the invoice terms
      (net payment window, deposit structure for corporate clients, and
      whether a minimum booking size applies).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-003"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-009.

  - rule_id: "HFLA-RULE-VS-003"
    rule_category: "VENDOR_SCHOOL_CORPORATE"
    rule_title: "Vendor pilot program — sponsored-design parameters and approval"
    status: "DRAFT"
    draft_recommendation: >
      Authorise a controlled vendor pilot program with the following
      parameters:
        (a) Sponsored-design catalogue: a maximum of ten (10) sponsored
            face-paint designs may be offered to a vendor partner at any
            given time.
        (b) Exclusivity: while the pilot is active, HFLA is the
            HFLA-only-provider for the sponsored-design catalogue (no
            other face-paint operator may use the same sponsored designs
            in HFLA's three-county service area for the pilot duration).
        (c) Disclosure: every customer-facing surface where a sponsored
            design appears must visibly identify the sponsorship (e.g.
            'Sponsored by …') — required for FTC endorsement-disclosure
            compliance and Google Ads Misrepresentation policy
            (HFLA-EVD-004) alignment.
        (d) Continuity of paid services: paid face-painting bookings
            continue uninterrupted during the pilot — the pilot is
            additive, not a free-only operating mode.
        (e) Family attendance: a member of the sponsor's family (or a
            designated brand-side representative) is expected to attend
            each sponsored-design event for brand-fit oversight.
        (f) Case-by-case CEO approval: each sponsored-design booking
            request is reviewed and approved individually by the CEO
            before confirmation — no general pre-approval is granted.
      The pilot is INTERNAL until CEO approves all six parameters and
      authorises specific sponsor partners.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-004"
    internal_notes: >
      CEO decision required: authorise all six pilot parameters, approve
      specific sponsor partners, and confirm the case-by-case approval
      workflow.  Decision captured in HFLA-BLK-023.  No customer-facing
      content for this pilot is generated until CEO confirms parameters.

  # ---- SAFETY_CARE (4 rules) -----------------------------------------------

  - rule_id: "HFLA-RULE-SC-001"
    rule_category: "SAFETY_CARE"
    rule_title: "Outdoor and weather event safety — safe working conditions required"
    status: "DRAFT"
    draft_recommendation: >
      Outdoor events require a shaded, protected setup area away from direct
      sun, rain, strong wind, sprinklers, smoke, dust, and unsafe heat (live
      booking-policy language, verified 2026-05-24).  If conditions are
      unsafe, services may need to move indoors, pause, or be adjusted for
      safety.  The weather cancellation and partial-refund policy must be
      defined by the CEO.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: weather cancellation client credit/refund
      policy.  Decision in HFLA-BLK-015.

  - rule_id: "HFLA-RULE-SC-002"
    rule_category: "SAFETY_CARE"
    rule_title: "Product safety — cosmetic-grade, FDA color-additive-compliant face paint"
    status: "DRAFT"
    draft_recommendation: >
      Face painting, glitter tattoo, and face gem products must meet
      cosmetic-grade safety standards and use only color additives permitted
      by FDA for skin application (per the FDA color-additive status list).
      California Proposition 65 also imposes lead limits on cosmetic
      additives that products must meet.  CEO must confirm the brand list
      HFLA artists may use and whether an allergy / sensitivity prompt is
      added to the quote intake form and to the live booking-policy page.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      No CEO blocker required if internal practice already meets FDA color-
      additive list (verify with operations); add the customer-facing
      allergy prompt under HFLA-BLK-020 if CEO authorises it.

  - rule_id: "HFLA-RULE-SC-003"
    rule_category: "SAFETY_CARE"
    rule_title: "Safety marketing claim — do not publish unqualified 'hypoallergenic'"
    status: "DRAFT"
    draft_recommendation: >
      Per the U.S. Food and Drug Administration ('Hypoallergenic Cosmetics',
      content current as of 2022-02-25), there are no federal standards or
      definitions governing the term 'hypoallergenic' for cosmetics; the term
      'has no real meaning in the marketplace.'  HFLA channel copy
      (website, ads, chatbot, operator scripts) must NOT use the unqualified
      claim 'hypoallergenic' for face paint or glitter products.
      Preferred language is 'cosmetic-grade, FDA color-additive compliant'
      (truthful and aligned with the underlying product specification).
      LA market reference (HFLA-EVD-006 BubbleMania & Co.) shows competitors
      that do publish the unqualified 'hypo allergenic' claim — HFLA should
      deliberately differentiate by using more accurate language rather
      than copying that wording.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-010"
    internal_notes: >
      CEO decision required: confirm preferred safety language for all public
      channels.  Decision in HFLA-BLK-020.  This rule prevents an FTC /
      misleading-cosmetics claim risk and a Google Ads misrepresentation
      risk (HFLA-EVD-004) before any ad copy goes live.

  - rule_id: "HFLA-RULE-SC-004"
    rule_category: "SAFETY_CARE"
    rule_title: "Insurance and certificate-of-insurance issuance"
    status: "DRAFT"
    draft_recommendation: >
      HFLA must maintain general-liability insurance covering bodily injury,
      property damage, and product / completed operations for face-painting
      and balloon-twisting services.  School, festival, and corporate
      clients commonly require a Certificate of Insurance (COI) naming the
      venue or host organisation as an additional insured.  CEO must
      confirm: (a) the active general-liability policy carrier and limits;
      (b) whether HFLA's policy supports adding venues / hosts as
      additional insured on a per-event basis; (c) the turnaround SLA for
      issuing a COI when a school or corporate client requests one;
      (d) whether COI issuance is included in the base booking fee or
      carries a service charge.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-002"
    internal_notes: >
      CEO decision required: confirm insurance carrier / limits, COI
      issuance workflow, and whether COI is bundled or charged.  Decision
      captured in HFLA-BLK-024.

  # ---- AI_CUSTOMER_RESPONSE (3 rules) ------------------------------------

  - rule_id: "HFLA-RULE-AR-001"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "AI chatbot pricing disclosure — scope and accuracy limits"
    status: "DRAFT"
    draft_recommendation: >
      The customer-facing chatbot may state the public $150 starting price and
      direct the customer to the contact form for a full quote.  The chatbot
      must NOT quote a final price for specific events, as pricing depends on
      guest count, travel, and service mix.  CEO must approve the precise
      pricing-disclosure language.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required: chatbot authority limit for pricing.  Decision
      in HFLA-BLK-017.

  - rule_id: "HFLA-RULE-AR-002"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "AI chatbot escalation — human quote threshold"
    status: "DRAFT"
    draft_recommendation: >
      When a chatbot user requests specific pricing, service customisation,
      school/corporate quotes, or multi-artist bookings, the chatbot must
      escalate to the human quote form or phone number (818-619-5506) rather
      than attempting to provide a binding quote.  Escalation language must
      be approved by the CEO.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-001"
    internal_notes: >
      CEO decision required.  Decision in HFLA-BLK-017.

  - rule_id: "HFLA-RULE-AR-003"
    rule_category: "AI_CUSTOMER_RESPONSE"
    rule_title: "Copilot internal decision-support — PII boundary"
    status: "DRAFT"
    draft_recommendation: >
      The COPILOT_INTERNAL_DECISION_SUPPORT channel MUST NOT receive
      customer personally identifiable information (PII).  Specifically,
      Copilot-internal projections, prompts, and operator-facing decision
      aids must never contain: customer name, customer email, customer
      phone, event address, billing address, client name, contact email,
      contact phone, lead name, quote recipient, or booking contact (the
      canonical PII-field set already enforced by the validator's
      PII_FIELD_NAMES gate, HFLA-EVD-005 Google Ads editorial policy).
      PII may continue to flow through the operator's quote workflow and
      the restricted operations workbook but MUST be redacted before any
      content is presented to or generated by Copilot.  This rule is the
      governance equivalent of the existing platform-level restriction
      that COPILOT_INTERNAL_DECISION_SUPPORT may not project from the
      RESTRICTED_OPERATIONS_PII channel.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-005"
    internal_notes: >
      CEO decision required: confirm the PII-redaction workflow for
      Copilot-internal prompts and confirm that operators understand that
      no customer PII may be pasted into Copilot decision-support inputs.
      Decision captured in HFLA-BLK-025.

  # ---- CHANNEL_IMPLEMENTATION (3 rules) ------------------------------------

  - rule_id: "HFLA-RULE-CI-001"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Google Ads claim accuracy — landing page alignment requirement"
    status: "DRAFT"
    draft_recommendation: >
      Any price claim in a Google Ads headline or description (e.g. 'Bookings
      from $150') must exactly match the price stated on the ad's landing
      page.  Per the Google Ads Misrepresentation policy
      (https://support.google.com/adspolicy/answer/6020955), ads must not
      omit pricing conditions, must not employ dishonest pricing practices,
      and must not promise products / services / promotional offers that are
      unavailable on the destination page.  All ad copy must reference the
      same starting price that appears on the website pricing page.  CEO
      must authorise the specific ad copy before the campaign launches.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-004"
    internal_notes: >
      CEO decision required: Google Ads campaign authorisation.  Decision in
      HFLA-BLK-016.

  - rule_id: "HFLA-RULE-CI-002"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Google Responsive Search Ad spec compliance — character limits"
    status: "DRAFT"
    draft_recommendation: >
      Any Google Ads responsive search ad (RSA) authored for HFLA must
      conform to the Google Ads specification (HFLA-EVD-011):
        - Headlines: up to 30 characters each, 3 minimum / 15 maximum per ad.
        - Descriptions: up to 90 characters each, 2 minimum / 4 maximum.
        - Display path: up to 15 characters per path field.
      The candidate headline and description drafts in this candidate
      (HFLA-PROJ-ADS-001, HFLA-PROJ-ADS-002) have been pre-checked for
      compliance with these limits.  CEO/operator must re-verify any
      revised wording against the limits before pasting into Google Ads.
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-011"
    internal_notes: >
      No standalone CEO blocker — this rule is a hard technical compliance
      requirement, not a business choice.  Reviewed under HFLA-BLK-016 with
      the Google Ads campaign authorisation.

  - rule_id: "HFLA-RULE-CI-003"
    rule_category: "CHANNEL_IMPLEMENTATION"
    rule_title: "Paid-ad spend gate — 100 USD cumulative cap requires CEO re-authorisation"
    status: "DRAFT"
    draft_recommendation: >
      No Google Ads campaign authored under this governance package may
      exceed one hundred US dollars ($100) of cumulative paid-ad spend
      without explicit CEO re-authorisation.  When cumulative spend on
      the active campaign reaches $100, the campaign must be paused at
      the Google Ads account level until the CEO approves a new spend
      cap (or budgeted weekly / monthly amount) in writing.  This gate
      caps initial paid-channel exposure during the commercial launch
      window and forces a deliberate go / no-go decision rather than
      passive auto-renewal.  Pairs with HFLA-RULE-CI-001 (claim accuracy)
      and HFLA-RULE-CI-002 (RSA character-limit compliance).
    channel_visibility: "INTERNAL_ONLY"
    source_evidence_ref: "HFLA-EVD-005"
    internal_notes: >
      CEO decision required: confirm the $100 cumulative cap, confirm the
      pause-and-re-authorise workflow, and designate who at Google Ads
      account level is authorised to pause and resume the campaign.
      Decision captured in HFLA-BLK-026.

