    related_evidence_ids: ["HFLA-EVD-001", "HFLA-EVD-002"]
    blocked_channels: ["WEBSITE_PUBLIC", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-023"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Authorise the vendor pilot program parameters: (a) maximum 10
      sponsored designs; (b) HFLA-only-provider exclusivity during the
      pilot; (c) visible sponsorship identification on every customer-facing
      surface; (d) continuation of paid services; (e) sponsor-family
      attendance at each sponsored event; (f) case-by-case CEO approval per
      booking.  Approve specific sponsor partners (if any).
    why_it_matters: >
      Sponsored content carries FTC endorsement-disclosure and Google Ads
      Misrepresentation-policy risk (HFLA-EVD-004).  Explicit parameters
      protect the brand and ensure operators apply identical rules to
      every sponsored engagement.
    risk_if_missing: >
      Operators may informally accept sponsored arrangements that violate
      FTC disclosure rules or undermine the paid-services revenue stream.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-VS-003"]
    related_evidence_ids: ["HFLA-EVD-004"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-024"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm general-liability insurance carrier and limits; confirm
      whether the policy supports per-event additional-insured endorsements
      for venues / hosts; set the COI-issuance SLA when a school or
      corporate client requests one; decide whether COI issuance is
      bundled with the booking fee or carries a separate service charge.
    why_it_matters: >
      School and corporate bookings commonly REQUIRE a COI before the
      contract is signed.  Without a confirmed COI workflow, these bookings
      stall and the segment cannot scale.
    risk_if_missing: >
      Schools and corporate clients will reject HFLA from their approved-
      vendor list if a COI cannot be issued promptly.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-SC-004", "HFLA-RULE-VS-001", "HFLA-RULE-VS-002"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-025"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm the PII-redaction workflow for Copilot-internal decision-
      support inputs: which fields must be redacted (canonical PII set:
      customer_name, customer_email, customer_phone, event_address,
      billing_address, client_name, contact_email, contact_phone, lead_name,
      quote_recipient, booking_contact), at what point in the operator
      workflow redaction occurs, and operator training acknowledgement that
      no PII may be pasted into Copilot inputs.
    why_it_matters: >
      Copilot-internal decision support has no public-facing surface, but
      content entering Copilot is processed off-platform.  PII must be
      excluded at the boundary, not relied on to be filtered downstream.
    risk_if_missing: >
      Customer PII may be sent to third-party AI services without a
      defensible redaction policy, creating privacy-law exposure and a
      governance gap relative to the platform's existing
      RESTRICTED_OPERATIONS_PII boundary.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-AR-003", "HFLA-RULE-AR-002"]
    related_evidence_ids: ["HFLA-EVD-005"]
    blocked_channels: ["COPILOT_INTERNAL_DECISION_SUPPORT", "QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-026"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm the $100 cumulative paid-ad spend gate.  Confirm: (a) the
      $100 cap is correct for the initial campaign window; (b) the campaign
      is paused at the Google Ads account level the moment cumulative spend
      reaches $100; (c) the workflow for the CEO to authorise the next
      spend tranche in writing; (d) who at Google Ads account level is
      authorised to pause and resume the campaign.
    why_it_matters: >
      The $100 gate caps initial paid-channel exposure during the
      commercial launch and forces a deliberate go / no-go decision rather
      than passive auto-renewal of spend.  Pairs with HFLA-BLK-016 (campaign
      authorisation) and HFLA-RULE-CI-001 (claim accuracy).
    risk_if_missing: >
      Without a hard spend cap, a poorly-performing campaign could continue
      drawing budget without governance visibility.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-CI-003", "HFLA-RULE-CI-001"]
    related_evidence_ids: ["HFLA-EVD-004", "HFLA-EVD-005"]
    blocked_channels: ["GOOGLE_ADS_PUBLIC"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-027"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm the artist dispatch / scheduling model: (A) single dispatcher
      assigns artists to incoming confirmed bookings; (B) round-robin pool;
      (C) artist self-claim with dispatcher backup.  Confirm the source-of-
      truth scheduling system and how scheduling conflicts are escalated.
    why_it_matters: >
      Inconsistent dispatch causes double-booked artists, late arrivals, and
      operator-side quoting friction (operators cannot confirm dates without
      knowing artist availability).  The model affects operator workflow,
      Copilot decision support, and the quote-response SLA (HFLA-BLK-018).
    risk_if_missing: >
      Bookings can be confirmed without a guaranteed artist, leading to
      late cancellations and customer complaints — the highest-impact
      brand-damage scenario for a family-event business.
    priority: "HIGH"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-QT-003", "HFLA-RULE-VS-001", "HFLA-RULE-VS-002"]
    related_evidence_ids: ["HFLA-EVD-002", "HFLA-EVD-003"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-028"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Set the same-day and same-weekend concurrent-booking capacity caps:
      maximum number of confirmed bookings per day and per weekend,
      conditional on artist roster size.  Define the rule the operator
      applies when an incoming inquiry exceeds capacity (waitlist,
      decline, refer to partner, etc.).
    why_it_matters: >
      Without a capacity policy, operators may over-book a single weekend,
      compromising service quality on the highest-demand dates.  Capacity
      rules also feed into the peak-surcharge decision (HFLA-BLK-011).
    risk_if_missing: >
      Over-booked weekends cause artist no-shows or short-staffed events,
      directly damaging the brand on the highest-revenue dates and
      triggering refund / make-good obligations.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-QT-003", "HFLA-RULE-VS-001"]
    related_evidence_ids: ["HFLA-EVD-003", "HFLA-EVD-009"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

  - blocker_id: "HFLA-BLK-029"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm tax treatment for HFLA bookings: (a) whether California
      sales tax applies to face-painting services as currently invoiced
      (per California Department of Tax and Fee Administration guidance,
      service-only labor is generally not subject to sales tax — confirm
      operator-side application); (b) the 1099-NEC reporting workflow for
      face-paint artists treated as independent contractors (issuance
      schedule, threshold $600, recipient TIN collection); (c) corporate-
      client invoicing format (whether HFLA collects W-9 from corporate
      clients).
    why_it_matters: >
      Tax exposure is silent until a CDTFA or IRS notice arrives.
      Operator-side invoice templates must be consistent with the chosen
      treatment; corporate-client invoicing also requires the right tax
      form on file.
    risk_if_missing: >
      Inconsistent operator invoicing creates audit risk and complicates
      year-end 1099 issuance for contracted artists.
    priority: "MEDIUM"
    status: "OPEN_CEO_INPUT_REQUIRED"
    related_rule_ids: ["HFLA-RULE-VS-002", "HFLA-RULE-PP-003"]
    related_evidence_ids: ["HFLA-EVD-002"]
    blocked_channels: ["QUOTE_OPERATOR_INTERNAL"]
    blocks_live_provisioning: false
    blocks_phase_1c_content_loading: false

