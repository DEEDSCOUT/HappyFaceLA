# ---------------------------------------------------------------------------
# 3. BLOCKER RECORDS — 29 ordinary CEO-decision blockers
#    All blocks_phase_1c_content_loading: false (ordinary business decisions).
# ---------------------------------------------------------------------------

blocker_records:

  - blocker_id: "HFLA-BLK-001"
    category: "CEO_INPUT_REQUIRED"
    decision_required: >
      Confirm that $150 is the authorised minimum booking price for a single
      service with one artist across all public channels and the customer
      chatbot.
    why_it_matters: >
      The $150 floor is currently on the live website (HFLA-EVD-001).
      Formalising it as a governed rule ensures all channels (website, ads,
      chatbot, operators) communicate a consistent floor price and prevents
      ad copy or chatbot responses from implying a lower entry point.
      LA-market comparator HFLA-EVD-007 (Paint On Your Face: face painting
      starting at $120/hr, 2-hour minimum, implying ~$240 effective minimum)
      places HFLA's $150 flat floor at or below the LA per-hour market floor.
    risk_if_missing: >
      Without CEO confirmation, a future channel update or chatbot response
