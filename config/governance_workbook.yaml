        error_message: "Select a valid evidence type."
    conditional_formatting_rules: []
    banner_content: "SOURCE EVIDENCE REGISTRY — INTERNAL CONTROLLED"
    banner_severity: INFO
    formula_requirements:
      - "Evidence ID auto-generated as EVD-{SEQUENCE}"

  - title: "12_RELEASE_CHANGELOG"
    purpose: >
      Immutable log of every commercial rule release: version, approval date,
      rules activated, channels deployed to, and rollback references.
      No deletion of rows permitted after entry.
    sensitivity: INTERNAL_CONTROLLED
    column_headers:
      - "Release Version"
      - "Release Date"
      - "CEO Approval Date"
      - "Rules Activated"
      - "Rules Superseded"
      - "Channels Deployed"
      - "Website Pages Changed"
      - "Google Ads Changes"
      - "AI Rules Activated"
      - "Rollback Reference"
      - "Release Brief Link"
      - "QA Verified By"
      - "Notes"
    frozen_row_count: 1
    filter_enabled: true
    editable_columns:
      - "Release Version"
      - "Release Date"
      - "CEO Approval Date"
      - "Rules Activated"
      - "Rules Superseded"
      - "Channels Deployed"
      - "Website Pages Changed"
      - "Google Ads Changes"
      - "AI Rules Activated"
      - "Rollback Reference"
      - "Release Brief Link"
