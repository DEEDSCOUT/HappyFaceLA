# Happy Faces LA — Commercial Control Room
# Drive Structure Specification
# Phase 1 — Local dry-run only. No live Google Drive assets.
#
# Classification key:
#   INTERNAL_CONTROLLED      — Internal staff only; no public distribution
#   RESTRICTED_PII           — Contains customer/financial PII; strictly need-to-know
#   CHANNEL_SAFE_AFTER_RELEASE — Machine-readable export; safe after CEO release approval

root_folder_name: "Happy Faces LA — Commercial Control Room"

children:

