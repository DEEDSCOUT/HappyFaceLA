  - document_name: "TEMPLATE — Website Ads AI Implementation Release Brief"
    asset_type: template
    classification: INTERNAL_CONTROLLED
    initial_status: "TEMPLATE — Populate from CEO-approved release package only"
    draft_banner: >
      TEMPLATE — DO NOT USE DIRECTLY.
      This template must be copied and populated from a CEO-approved release package.
      No release brief is valid without CEO signature and effective date.
    sections:
      - heading: "1. Release Version"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Release version identifier (e.g. v1.0.0).
          Must match the release version in 12_RELEASE_CHANGELOG.
        notes: "Semantic versioning recommended: MAJOR.MINOR.PATCH"

      - heading: "2. CEO Approval and Effective Date"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] CEO name, approval date, and effective date for this release.
          No implementation may proceed without this section completed and signed.
        notes: "Required: CEO full name, date approved, effective date."

      - heading: "3. Rules Activated in This Release"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] List of Rule IDs and titles activated in this release,
          sourced from 04_ACTIVE_RULES_EXPORT.
        notes: "Each rule must be in APPROVED status with non-empty Final Effective Rule."

      - heading: "4. Website Pages Requiring Change"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] List of website pages that require copy or content updates
          as a result of this release. Include page URL and change type.
        notes: "Must reference exact page URLs."

      - heading: "5. Exact Website Copy Authorized for Publication"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] The exact, word-for-word website copy authorized for publication.
          No variation from this copy is permitted without a new release.
        notes: "Copy must be sourced from approved 03_RULE_REGISTER_MASTER rows."

      - heading: "6. Google Ads Claims Authorized for Use"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] List of approved claims for Google Ads copy, headlines,
          and descriptions. Must comply with Google Ads policies.
        notes: "Include: Headline copy, description copy, prohibited claim list."

      - heading: "7. Claims Prohibited from Use"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Explicit list of claims that must NOT appear in any
          website, ad, or AI response for this release period.
        notes: "Include unapproved pricing claims, unverified superlatives, prohibited comparisons."

      - heading: "8. Quote Form / CRM Field Changes"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Changes required to the website quote form and CRM fields
          as a result of this release.
        notes: "Include field names, validation rules, and dropdown values."

      - heading: "9. AI / Copilot Rules Activated"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] List of AI response rules activated in this release,
          sourced from 10_AI_CUSTOMER_RESPONSE_MATRIX approved rows.
        notes: "Include trigger topics, permitted boundaries, prohibited content."

      - heading: "10. Developer Acceptance Checklist"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Checklist of implementation tasks that must be completed
          and verified before this release is considered deployed.
        notes: "Include: Each change item, assignee, due date, verification method."

      - heading: "11. QA Evidence"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Links to QA test results, screenshots, or other evidence
          confirming implementation accuracy.
        notes: "Store evidence in 03_SOURCE_EVIDENCE_COMPLIANCE / Website Audit Evidence."

      - heading: "12. Rollback Procedure"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Exact steps to roll back this release if a post-deployment
          issue is discovered.
        notes: "Must include: rollback trigger criteria, step-by-step instructions, rollback owner."

      - heading: "13. Final Release Sign-Off"
        level: 1
        placeholder_text: >
          [TEMPLATE FIELD] Final sign-off confirming all checklist items are complete,
          QA is verified, and the release is live as approved.
        notes: "Required: Developer sign-off, QA sign-off, CEO acknowledgment."
